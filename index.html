<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Crown Career - BCC Typing Master</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #eef2f3; padding: 20px; }
        .wrapper { max-width: 900px; margin: auto; background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        /* সুতন্বীএমজে এবং বিসিসি স্ট্যান্ডার্ড ফন্ট */
        #display, #typing-box, #analysis-area { 
            font-family: 'SutonnyMJ', 'SolaimanLipi', Arial; 
            font-size: 28px; line-height: 1.5; text-align: left;
        }
        
        #display { background: #fff3cd; padding: 25px; border: 2px solid #ffeeba; border-radius: 12px; margin-bottom: 25px; color: #856404; }
        textarea { width: 100%; height: 180px; padding: 15px; border: 2px solid #007bff; border-radius: 10px; outline: none; box-sizing: border-box; }
        
        .correct { color: #28a745 !important; font-weight: bold; border-bottom: 3px solid #28a745; }
        .wrong { color: #dc3545 !important; text-decoration: underline; font-weight: bold; }
        #analysis-area { margin-top: 25px; border-top: 2px solid #eee; padding-top: 20px; }
        
        .result-bar { background: #343a40; color: white; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; justify-content: space-around; font-weight: bold; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="result-bar">
        <div>সঠিক শব্দ: <span id="word-count">০</span></div>
        <div>নির্ভুলতা: <span id="accuracy-rate">০.০০</span>%</div>
    </div>

    <div id="display">২০১৪ ও ২০১৬ সালের পর আবারও চ্যাম্পিয়ন্স লিগ কোয়ার্টার ফাইনালে আতলেতিকো মাদ্রিদের কাছে হেরে গেল বার্সা।</div>

    <textarea id="typing-box" placeholder="বিজয় ক্লাসিক (ANSI) দিয়ে টাইপ করুন..." oninput="bccFinalEngine()"></textarea>

    <div id="analysis-area">বিশ্লেষণ এখানে দেখাবে...</div>
</div>

<script>
    // প্যাসেজটিকে একদম ফ্রেশ করে নেওয়া (Normalize)
    const targetPassage = "২০১৪ ও ২০১৬ সালের পর আবারও চ্যাম্পিয়ন্স লিগ কোয়ার্টার ফাইনালে আতলেতিকো মাদ্রিদের কাছে হেরে গেল বার্সা।";
    const cleanTarget = targetPassage.normalize('NFC').replace(/[\u200B-\u200D\uFEFF]/g, '').trim();

    function decodeBCC(str) {
        if (!str) return "";
        
        // বিজয় এএনএসআই টু ইউনিকোড ম্যাপ
        const map = {
            'a':'ঋ','b':'ন','c':'এ','d':'ি','e':'ড','f':'া','g':'হ','h':'ব','i':'হ','j':'র','k':'ক','l':'ত','m':'ম','n':'স','o':'গ','p':'ড়','q':'ঙ','r':'প','s':'ু','t':'ট','u':'ঝ','v':'ল','w':'য়','x':'ও','y':'চ','z':'য',
            'A':'ৃ','B':'ণ','C':'ঐ','D':'ী','E':'ঢ','F':'অ','G':'।','H':'ভ','I':'ও','J':'্র','K':'খ','L':'থ','M':'উ','N':'ষ','O':'ঘ','P':'ঢ়','Q':'ং','R':'ফ','S':'ূ','T':'ঠ','U':'ঝ','V':'ল','W':'য়','X':'ৗ','Y':'ছ','Z':'্য',
            '1':'১','2':'২','3':'৩','4':'৪','5':'৫','6':'৬','7':'৭','8':'৮','9':'৯','0':'০',
            '‡':'ে','†':'ে','v':'া','i':'ি','I':'ও','x':'ও','´':'্য','`':'্য'
        };

        let result = "";
        for (let i = 0; i < str.length; i++) {
            let cur = str[i], nxt = str[i+1];
            // কার-চিহ্ন পজিশন শিফটিং (যা আপনার ছবির মূল সমস্যা ছিল)
            if (['d', '‡', '†', 'c', 'C', 'i'].includes(cur) && nxt) {
                result += (map[nxt] || nxt) + (map[cur] || cur);
                i++;
            } else {
                result += map[cur] || cur;
            }
        }
        // ইউনিকোড নরমালাইজেশন করে র্য-ফলা ফিক্স করা
        return result.normalize('NFC').replace(/র‌্য/g, 'র্য');
    }

    function bccFinalEngine() {
        const input = document.getElementById('typing-box').value;
        const uWords = input.trim().split(/\s+/);
        const tWords = cleanTarget.split(/\s+/);
        
        let correctWords = 0;
        let html = "বিশ্লেষণ: <br>";

        tWords.forEach((target, index) => {
            let userRaw = uWords[index] || "";
            let userUni = decodeBCC(userRaw);
            let goal = target.normalize('NFC').trim();

            // এখানে ৩ স্তরের চেকিং লজিক (সরাসরি, কনভার্টেড এবং ট্রিমড)
            if (userRaw !== "" && (userUni === goal || userRaw === goal)) {
                html += `<span class="correct">${userRaw} </span>`;
                correctWords++;
            } else if (userRaw !== "") {
                html += `<span class="wrong">${userRaw}</span> `;
            }
        });

        // পরিসংখ্যান আপডেট
        document.getElementById('word-count').innerText = correctWords;
        document.getElementById('accuracy-rate').innerText = ((correctWords / tWords.length) * 100).toFixed(2);
        document.getElementById('analysis-area').innerHTML = html;
    }
</script>

</body>
</html>
