<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Crown Career | Smart Unicode Engine</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f4f8; padding: 20px; }
        .wrapper { max-width: 900px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #1a73e8; }
        .admin-section { background: #eef2f7; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        textarea { width: 100%; border-radius: 8px; border: 2px solid #ddd; padding: 15px; font-size: 20px; box-sizing: border-box; outline: none; }
        #typing-input { border-color: #1a73e8; font-family: 'SutonnyMJ', serif; height: 120px; }
        .box { border: 2px solid #eee; border-radius: 10px; padding: 20px; margin: 20px 0; min-height: 100px; font-size: 24px; line-height: 1.8; background: #fafafa; }
        .correct { color: #2ecc71; }
        .wrong { color: #e74c3c; background: #ffdada; border-radius: 4px; text-decoration: underline; }
        .active { border-bottom: 4px solid #1a73e8; background: #e8f0fe; }
        .stats { display: flex; justify-content: space-around; background: #1a73e8; color: white; padding: 15px; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="wrapper">
    <h1>Crown Career - স্মার্ট টাইপিং ইঞ্জিন</h1>

    <div class="admin-section">
        <label><b>এখানে পরীক্ষার টেক্সট দিন (বিজয় ৫২ বা ইউনিকোড যেকোনো ফরম্যাটে):</b></label>
        <textarea id="source-input" style="height: 80px; margin-top: 10px;" placeholder="টেক্সট পেস্ট করুন..."></textarea>
        <button id="set-text-btn" style="margin-top: 10px; padding: 10px 20px; background: #1a73e8; color: white; border: none; border-radius: 5px; cursor: pointer;">পরীক্ষা সেট করুন</button>
    </div>

    <div id="display-area" class="box">এখানে আপনার পরীক্ষার টেক্সট দেখাবে...</div>

    <label><b>বিজয় ৫২ কিবোর্ডে টাইপ করুন:</b></label>
    <textarea id="typing-input" placeholder="টাইপ শুরু করুন..."></textarea>
    
    <div class="stats">
        <div>সঠিক: <span id="correct-count">0</span></div>
        <div>ভুল: <span id="wrong-count">0</span></div>
        <div>নির্ভুলতা: <span id="accuracy">0</span>%</div>
    </div>
</div>

<script>
// বিজয় ৫২ ক্লাসিক টু ইউনিকোড ম্যাপিং
const bijoyMap = {
    'a':'া', 'i':'ি', 'I':'ী', 'u':'ু', 'U':'ূ', 'e':'ে', 'E':'ৈ', 'o':'ো', 'O':'ৌ',
    'j':'ক', 'k':'খ', 'l':'গ', 'm':'ঘ', 'n':'ঙ', 'p':'চ', 'q':'ছ', 'r':'জ', 's':'ঝ', 't':'ঞ',
    'v':'ট', 'w':'ঠ', 'x':'ড', 'y':'ঢ', 'z':'ণ', 'A':'ত', 'B':'থ', 'C':'দ', 'D':'ধ', 'E':'ন',
    'G':'প', 'H':'ফ', 'I':'ব', 'J':'ভ', 'K':'ম', 'L':'য', 'M':'র', 'N':'ল', 'O':'শ', 'P':'ষ', 'Q':'স', 'R':'হ',
    'S':'ড়', 'T':'ঢ়', 'U':'য়', 'V':'ৎ', 'W':'ং', 'X':'ঃ', 'Y':'ঁ', 'Z':'।', 'g':'', '&':'ষ',
    '0':'০', '1':'১', '2':'২', '3':'৩', '4':'৪', '5':'৫', '6':'৬', '7':'৭', '8':'৮', '9':'৯'
};

// কনভার্টার ইঞ্জিন: যা যেকোনো ইনপুটকে ইউনিকোড করবে
function toUnicode(text) {
    if (!text) return "";
    // যদি টেক্সটে অলরেডি বাংলা থাকে, তবে কনভার্ট করার দরকার নেই
    if (/[\u0980-\u09FF]/.test(text)) return text.trim();

    let output = "";
    for (let char of text) {
        output += bijoyMap[char] || char;
    }
    // কার চিহ্নের পজিশন ঠিক করার লজিক
    return output.replace(/ে([ক-হ])/g, '$1ে')
                 .replace(/ি([ক-হ])/g, '$1ি')
                 .replace(/ৈ([ক-হ])/g, '$1ৈ')
                 .replace(/ো([ক-হ])/g, '$1ো');
}

let sourceWords = [];

const displayArea = document.getElementById('display-area');
const typingInput = document.getElementById('typing-input');
const sourceInput = document.getElementById('source-input');

// পরীক্ষা সেটআপ করার ফাংশন
function setupTest(text) {
    // ১. আপনার দেয়া টেক্সটকে আগে ইউনিকোডে রূপান্তর করা হচ্ছে
    let unicodeSource = toUnicode(text);
    sourceWords = unicodeSource.split(/\s+/);
    
    displayArea.innerHTML = sourceWords.map(w => `<span>${w}</span>`).join(' ');
    typingInput.value = "";
    updateStats(0, 0);
}

document.getElementById('set-text-btn').addEventListener('click', () => {
    setupTest(sourceInput.value);
});

// টাইপিং চেক করার লজিক
typingInput.addEventListener('input', function() {
    let typedRaw = this.value.split(/\s+/);
    let spans = displayArea.querySelectorAll('span');
    let correct = 0;
    let wrong = 0;

    spans.forEach((span, i) => {
        if (!typedRaw[i]) {
            span.className = '';
            return;
        }

        // ২. আপনার টাইপ করা বিজয় টেক্সটকেও ইউনিকোডে রূপান্তর করে চেক করা হচ্ছে
        let typedUnicode = toUnicode(typedRaw[i]);
        let targetUnicode = sourceWords[i];

        if (typedUnicode === targetUnicode) {
            span.className = 'correct';
            correct++;
        } else {
            span.className = 'wrong';
            wrong++;
        }

        if (i === typedRaw.length - 1) span.classList.add('active');
    });

    updateStats(correct, wrong);
});

function updateStats(c, w) {
    document.getElementById('correct-count').innerText = c;
    document.getElementById('wrong-count').innerText = w;
    let total = c + w;
    document.getElementById('accuracy').innerText = total > 0 ? ((c / total) * 100).toFixed(1) : 0;
}
</script>

</body>
</html>
