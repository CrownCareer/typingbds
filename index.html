<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crown Career | Bijoy Typing Master</title>
    <style>
        :root {
            --primary: #1a73e8;
            --success: #28a745;
            --error: #dc3545;
            --bg: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .main-container {
            max-width: 900px;
            width: 100%;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        h1 { text-align: center; color: var(--primary); margin-bottom: 30px; }

        /* সোর্স টেক্সট এরিয়া */
        #display-text {
            font-size: 24px;
            line-height: 1.8;
            padding: 20px;
            background: #fff;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            margin-bottom: 20px;
            min-height: 100px;
            word-wrap: break-word;
        }

        /* টাইপিং ইনপুট */
        #typing-area {
            width: 100%;
            height: 150px;
            font-size: 22px;
            padding: 15px;
            border: 2px solid var(--primary);
            border-radius: 10px;
            box-sizing: border-box;
            outline: none;
            resize: none;
            font-family: 'SutonnyMJ', serif; /* বিজয় ফন্ট */
        }

        /* স্ট্যাটাস বার */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-top: 25px;
        }

        .stat-card {
            background: #eef2f7;
            padding: 15px;
            text-align: center;
            border-radius: 8px;
            font-weight: bold;
            color: var(--primary);
        }

        /* টেক্সট হাইলাইটিং */
        .correct { color: var(--success); }
        .wrong { color: var(--error); text-decoration: underline; }
        .active { background-color: #fff3cd; border-bottom: 3px solid var(--primary); }
    </style>
</head>
<body>

<div class="main-container">
    <h1>Crown Career: বিজয় টাইপিং পরীক্ষা</h1>

    <div id="display-text"></div>

    <textarea id="typing-area" placeholder="বিজয় ৫২ (Classic) মোডে এখানে টাইপ করুন..."></textarea>

    <div class="stats-bar">
        <div class="stat-card">সঠিক শব্দ<br><span id="correct-words">0</span></div>
        <div class="stat-card">ভুল শব্দ<br><span id="wrong-words">0</span></div>
        <div class="stat-card">নির্ভুলতা<br><span id="accuracy">0</span>%</div>
        <div class="stat-card">WPM<br><span id="wpm">0</span></div>
    </div>
</div>

<script>
/** * Bijoy ANSI to Unicode Mapping Engine
 * এটি আপনার দেওয়া সোর্স এবং ইউজারের ইনপুট—উভয়কেই ইউনিকোডে রূপান্তর করবে।
 */
const bijoyMapping = {
    'Avgv‡`i': 'আমাদের', '‡mvbvi': 'সোনার', 'evsjv': 'বাংলা',
    'Avwg': 'আমি', '†Zvgvq': 'তোমায়', 'fv‡ivevwm': 'ভালোবাসি',
    'wPiw`b': 'চিরদিন', '†Zvgvi': 'তোমার', 'AvKvk': 'আকাশ',
    'evZvm': 'বাতাস', 'cÖv‡Y': 'প্রাণে', 'evRvq': 'বাজায়', 'euvwk': 'বাঁশি'
    // আপনি এখানে আরও শত শত বিজয়ের শব্দ যুক্ত করতে পারেন।
};

function convertToUnicode(text) {
    if (!text) return "";
    let words = text.split(/\s+/);
    return words.map(w => bijoyMapping[w] || w).join(' ');
}

// ১. আপনার দেওয়া সোর্স টেক্সট (বিজয় বা ইউনিকোড যেকোনোভাবে দিতে পারেন)
const rawSource = "Avgv‡`i ‡mvbvi evsjv Avwg †Zvgvq fv‡ivevwm"; 
const sourceUnicode = convertToUnicode(rawSource);
const sourceWords = sourceUnicode.split(' ');

const displayArea = document.getElementById('display-text');
const inputArea = document.getElementById('typing-area');

// ২. শুরুতে টেক্সট ডিসপ্লে করা
function initDisplay() {
    displayArea.innerHTML = sourceWords.map(word => `<span>${word}</span>`).join(' ');
}
initDisplay();

// ৩. মেইন টাইপিং চেকার ও স্ট্যাটাস লজিক
let startTime = null;

inputArea.addEventListener('input', () => {
    if (!startTime) startTime = new Date();

    const typedRaw = inputArea.value;
    const typedUnicode = convertToUnicode(typedRaw);
    const typedWords = typedUnicode.trim().split(/\s+/);

    let correctCount = 0;
    let wrongCount = 0;
    const spans = displayArea.querySelectorAll('span');

    spans.forEach((span, index) => {
        const target = sourceWords[index];
        const typed = typedWords[index];

        if (typed == null) {
            span.className = '';
        } else if (typed === target) {
            span.className = 'correct';
            correctCount++;
        } else {
            span.className = 'wrong';
            wrongCount++;
        }

        // বর্তমান কোন শব্দে ইউজার আছে তা হাইলাইট করা
        if (index === typedWords.length - 1) {
            span.classList.add('active');
        }
    });

    // ৪. স্ট্যাটাস আপডেট (Accuracy & WPM)
    updateStats(correctCount, wrongCount);
});

function updateStats(correct, wrong) {
    const total = correct + wrong;
    const accuracy = total > 0 ? (correct / total) * 100 : 0;
    
    // WPM Calculation
    const timeElapsed = (new Date() - startTime) / 60000; // minutes
    const wpm = timeElapsed > 0 ? Math.round(correct / timeElapsed) : 0;

    document.getElementById('correct-words').innerText = correct;
    document.getElementById('wrong-words').innerText = wrong;
    document.getElementById('accuracy').innerText = accuracy.toFixed(1);
    document.getElementById('wpm').innerText = wpm;
}
</script>

</body>
</html>
