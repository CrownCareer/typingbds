<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Typing Exam - Fixed</title>
    <style>
        :root { --blue: #0056b3; --green: #28a745; --red: #dc3545; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); padding: 20px; }
        .box { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        
        /* ফন্ট সেটিংস: SutonnyMJ ইনস্টল থাকা জরুরি */
        #p-text, #t-input, #user-compare-text { 
            font-family: 'SutonnyMJ', Arial, sans-serif; 
            font-size: 24px; line-height: 1.8;
        }

        textarea { width: 100%; height: 120px; border: 2px solid var(--blue); border-radius: 8px; padding: 10px; outline: none; }
        .error-highlight { color: var(--red); text-decoration: underline; font-weight: bold; }
        .success-text { color: black; }
        .hidden { display: none !important; }
        .btn-main { background: var(--blue); color: white; padding: 12px 40px; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div id="page-exam">
    <div class="box">
        <div id="p-text">২০১৪ ও ২০১৬ সালের পর আবারও চ্যাম্পিয়ন্স লিগ কোয়ার্টার ফাইনালে আতলেতিকো মাদ্রিদের কাছে হেরে গেল বার্সা।</div>
    </div>
    <div class="box">
        <textarea id="t-input" placeholder="বিজয় ক্লাসিক মোডে টাইপ করুন..." oninput="startTimer()"></textarea>
    </div>
    <div style="text-align: right;">
        <button class="btn-main" style="background: var(--green);" onclick="finishExam()">Go to Finish</button>
    </div>
</div>

<div id="page-result" class="box hidden">
    <h2 style="text-align: center; color: var(--blue);">টাইপিং ফলাফল</h2>
    <div id="res-stats" style="text-align:center; font-size: 20px; margin-bottom: 20px;"></div>
    <div id="user-compare-text" class="box" style="background: #f9f9f9;"></div>
    <center><button class="btn-main" onclick="location.reload()">আবার চেষ্টা করুন</button></center>
</div>

<script>
    const passage = "২০১৪ ও ২০১৬ সালের পর আবারও চ্যাম্পিয়ন্স লিগ কোয়ার্টার ফাইনালে আতলেতিকো মাদ্রিদের কাছে হেরে গেল বার্সা।";
    let timerOn = false;

    // ১. পাওয়ারফুল ম্যাপিং ইঞ্জিন: যা কিবোর্ডের ইংরেজি ইনপুটকে বাংলায় রূপান্তর করবে
    function fixBijoySequence(str) {
        if (!str) return "";
        const map = {
            'a':'ঋ', 'b':'ন', 'c':'এ', 'd':'ি', 'e':'ড', 'f':'া', 'g':'হ', 'h':'ব', 'i':'হ', 'j':'র', 'k':'ক', 'l':'ত', 'm':'ম', 'n':'স', 'o':'গ', 'p':'ড়', 'q':'ঙ', 'r':'প', 's':'ু', 't':'ট', 'u':'ঝ', 'v':'ল', 'w':'য়', 'x':'ও', 'y':'চ', 'z':'য',
            'A':'ৃ', 'B':'ণ', 'C':'ঐ', 'D':'ী', 'E':'ঢ', 'F':'অ', 'G':'।', 'H':'ভ', 'I':'ক্ষ', 'J':'্র', 'K':'খ', 'L':'থ', 'M':'উ', 'N':'ষ', 'O':'ঘ', 'P':'ঢ়', 'Q':'ং', 'R':'ফ', 'S':'ূ', 'T':'ঠ', 'U':'ঝ', 'V':'ল', 'W':'য়', 'X':'ৗ', 'Y':'ছ', 'Z':'্য',
            '1':'১', '2':'২', '3':'৩', '4':'৪', '5':'৫', '6':'৬', '7':'৭', '8':'৮', '9':'৯', '0':'০'
        };

        let output = "";
        for (let i = 0; i < str.length; i++) {
            let cur = str[i], nxt = str[i+1];
            // ই-কার (d) বা এ-কার (c) আগে থাকলে তা বর্ণের পরে নিয়ে আসা
            if (['d', 'c', 'C'].includes(cur) && nxt) {
                output += (map[nxt] || nxt) + (map[cur] || cur);
                i++;
            } else {
                output += map[cur] || cur;
            }
        }
        return output.normalize('NFC').trim();
    }

    function startTimer() { timerOn = true; }

    function finishExam() {
        const rawInput = document.getElementById('t-input').value;
        const iWords = rawInput.trim().split(/\s+/);
        const pWords = passage.trim().split(/\s+/);

        let correctCount = 0;
        let comparisonHTML = "";

        pWords.forEach((word, idx) => {
            const userRaw = iWords[idx] || "";
            const convertedUser = fixBijoySequence(userRaw);
            const targetWord = word.normalize('NFC').trim();

            if (convertedUser === targetWord && targetWord !== "") {
                comparisonHTML += `<span class="success-text">${userRaw} </span>`;
                correctCount++;
            } else if (userRaw !== "") {
                comparisonHTML += `<span class="error-highlight">${userRaw}</span> `;
            }
        });

        document.getElementById('res-stats').innerText = `WPM: ${Math.round(rawInput.length/5)} | Accuracy: ${((correctCount/pWords.length)*100).toFixed(2)}%`;
        document.getElementById('user-compare-text').innerHTML = comparisonHTML;
        document.getElementById('page-exam').classList.add('hidden');
        document.getElementById('page-result').classList.remove('hidden');
    }
</script>
</body>
</html>
