<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Crown Career | Typing Fix</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f7f6; padding: 20px; }
        .wrapper { max-width: 900px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .box { border: 2px solid #eee; border-radius: 10px; padding: 20px; margin-bottom: 20px; font-size: 24px; line-height: 1.8; background: #fafafa; }
        textarea { width: 100%; height: 120px; font-size: 22px; padding: 15px; border: 2px solid #1a73e8; border-radius: 10px; outline: none; box-sizing: border-box; }
        .correct { color: #2ecc71; }
        .wrong { color: #e74c3c; background: #ffdada; border-radius: 4px; text-decoration: underline; }
        .active { border-bottom: 3px solid #1a73e8; background: #e8f0fe; }
        .stats { display: flex; justify-content: space-around; background: #1a73e8; color: white; padding: 15px; border-radius: 10px; margin-top: 20px; }
        .admin-panel { margin-bottom: 20px; padding: 15px; background: #eef2f7; border-radius: 10px; }
        #new-source-text { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 5px; border: 1px solid #ccc; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="admin-panel">
        <input type="text" id="new-source-text" placeholder="পরীক্ষার টেক্সট এখানে দিন (যেকোনো জায়গা থেকে কপি করা)...">
        <button onclick="init(document.getElementById('new-source-text').value)" style="padding: 10px 20px; cursor: pointer;">সেট করুন</button>
    </div>

    <div id="display-area" class="box"></div>
    <textarea id="typing-input" placeholder="বিজয় ৫২ বা ইউনিকোডে টাইপ করুন..."></textarea>
    
    <div class="stats">
        <div>সঠিক শব্দ: <span id="correct-count">0</span></div>
        <div>ভুল শব্দ: <span id="wrong-count">0</span></div>
        <div>নির্ভুলতা: <span id="accuracy">0</span>%</div>
    </div>
</div>

<script>
// ১. প্রফেশনাল বিজয় টু ইউনিকোড ম্যাপ
const bijoyToUniMap = {
    'A': 'ত', 'B': 'থ', 'C': 'দ', 'D': 'ধ', 'E': 'ন', 'G': 'প', 'H': 'ফ', 'I': 'ব', 'J': 'ভ', 'K': 'ম', 'L': 'য', 'M': 'র', 'N': 'ল', 'O': 'শ', 'P': 'ষ', 'Q': 'স', 'R': 'হ', 'S': 'ড়', 'T': 'ঢ়', 'U': 'য়', 'V': 'ৎ', 'W': 'ং', 'X': 'ঃ', 'Y': 'ঁ', 'Z': '।', 'a': 'া', 'i': 'ি', 'I': 'ী', 'u': 'ু', 'U': 'ূ', 'e': 'ে', 'E': 'ৈ', 'o': 'ো', 'O': 'ৌ', 'j': 'ক', 'k': 'খ', 'l': 'গ', 'm': 'ঘ', 'n': 'ঙ', 'p': 'চ', 'q': 'ছ', 'r': 'জ', 's': 'ঝ', 't': 'ঞ', 'v': 'ট', 'w': 'ঠ', 'x': 'ড', 'y': 'ঢ', 'z': 'ণ', 'g': '', '&': 'ষ'
};

// ২. অটো ডিটেকশন কনভার্টার
function getSmartText(text) {
    // যদি টেক্সট আগে থেকেই ইউনিকোড হয় (বাংলা বর্ণ থাকে), তবে কনভার্ট করবে না
    const isUnicode = /[\u0980-\u09FF]/.test(text);
    if (isUnicode) return text;

    // নতুবা বিজয় ASCII থেকে ইউনিকোড করবে
    let output = "";
    for (let char of text) {
        output += bijoyToUniMap[char] || char;
    }
    // কার চিহ্নের পজিশন ঠিক করা (সহজ লজিক)
    return output.replace(/ে([ক-হ])/g, '$1ে').replace(/ি([ক-হ])/g, '$1ি');
}

let originalText = "২০১৪ ও ২০১৬ সালের পর আবারও চ্যাম্পিয়ন্স লিগ";
let sourceWords = [];

function init(text) {
    if(!text) return;
    originalText = text.trim().replace(/\s+/g, ' ');
    sourceWords = originalText.split(' ');
    document.getElementById('display-area').innerHTML = sourceWords.map(w => `<span>${w}</span>`).join(' ');
    document.getElementById('typing-input').value = "";
}

init(originalText);

document.getElementById('typing-input').addEventListener('input', function() {
    let rawValue = this.value;
    let typedWordsRaw = rawValue.split(/\s+/);
    
    let correct = 0;
    let wrong = 0;
    let spans = document.querySelectorAll('#display-area span');

    spans.forEach((span, i) => {
        if (!typedWordsRaw[i]) {
            span.className = '';
            return;
        }

        // এখানে স্মার্ট কনভার্টার কাজ করছে
        let processedTyped = getSmartText(typedWordsRaw[i]);
        let target = sourceWords[i];

        if (processedTyped === target) {
            span.className = 'correct';
            correct++;
        } else {
            span.className = 'wrong';
            wrong++;
        }

        if (i === typedWordsRaw.length - 1) span.classList.add('active');
    });

    document.getElementById('correct-count').innerText = correct;
    document.getElementById('wrong-count').innerText = wrong;
    let total = correct + wrong;
    document.getElementById('accuracy').innerText = total > 0 ? ((correct / total) * 100).toFixed(1) : 0;
});
</script>

</body>
</html>
