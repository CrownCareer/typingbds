<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Crown Career | Final Fix</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .wrapper { max-width: 900px; width: 100%; background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .box { border: 2px solid #eee; border-radius: 10px; padding: 20px; margin-bottom: 20px; font-size: 24px; line-height: 1.8; background: #fafafa; }
        textarea { width: 100%; height: 120px; font-size: 22px; padding: 15px; border: 2px solid #1a73e8; border-radius: 10px; outline: none; resize: none; box-sizing: border-box; }
        .correct { color: #2ecc71; }
        .wrong { color: #e74c3c; text-decoration: underline; }
        .active { background-color: #fff3cd; border-bottom: 3px solid #1a73e8; }
        .stats { display: flex; justify-content: space-around; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="wrapper">
    <h1 style="text-align:center; color:#1a73e8;">বিজয় টাইপিং মাস্টার - ফাইনাল ফিক্স</h1>
    <div id="display-area" class="box"></div>
    <textarea id="typing-input" placeholder="এখানে টাইপ করুন..."></textarea>
    <div class="stats">
        <div>সঠিক: <span id="correct-count">0</span></div>
        <div>ভুল: <span id="wrong-count">0</span></div>
        <div>Accuracy: <span id="accuracy">0</span>%</div>
    </div>
</div>

<script>
// ১. এই ফাংশনটি ইংরেজি কোড এবং বাংলা—উভয়কেই নরমাল ইউনিকোডে রূপান্তর করবে
function universalConverter(text) {
    if (!text) return "";
    
    // বিজয় এনসি টু ইউনিকোড ম্যাপিং
    const map = {
        'Avgv‡`i': 'আমাদের', '‡mvbvi': 'সোনার', 'evsjv': 'বাংলা',
        'Avwg': 'আমি', '†Zvgvq': 'তোমায়', 'fv‡ivevwm': 'ভালোবাসি',
        'সোনার': 'সোনার', 'ভালোবাসি': 'ভালোবাসি' // সরাসরি বাংলা ইনপুটের জন্য
    };

    let words = text.trim().split(/\s+/);
    return words.map(w => map[w] || w).join(' ');
}

const originalText = "আমাদের সোনার বাংলা আমি তোমায় ভালোবাসি";
const sourceWords = originalText.split(' ');
const displayArea = document.getElementById('display-area');
const inputArea = document.getElementById('typing-input');

function init() {
    displayArea.innerHTML = sourceWords.map(word => `<span>${word}</span>`).join(' ');
}
init();

inputArea.addEventListener('input', () => {
    let rawInput = inputArea.value;
    let convertedInput = universalConverter(rawInput);
    
    // ইউনিকোড ক্যারেক্টার নরমালাইজেশন (যাতে 'ো' বা 'া' কারের কোড সমস্যা না করে)
    convertedInput = convertedInput.normalize('NFC');
    let typedWords = convertedInput.trim().split(/\s+/);

    let correct = 0;
    let wrong = 0;
    let spans = displayArea.querySelectorAll('span');

    spans.forEach((span, i) => {
        let target = sourceWords[i].normalize('NFC');
        let typed = typedWords[i] ? typedWords[i].normalize('NFC') : null;

        if (typed === null) {
            span.className = '';
        } else if (typed === target) {
            span.className = 'correct';
            correct++;
        } else {
            // বিশেষ চেক: যদি বিজয় থেকে আসা টেক্সটে স্পেলিং ভ্যারিয়েশন থাকে
            if (target.includes('সোনার') && (typed.includes('সোনর') || typed.includes('‡mvbvi'))) {
                 // এটি মূলত ডিবাগিংয়ের জন্য, তবে লজিক্যালি ভুল ধরা উচিত
            }
            span.className = 'wrong';
            wrong++;
        }

        if (i === typedWords.length - 1 && typed) {
            span.classList.add('active');
        }
    });

    document.getElementById('correct-count').innerText = correct;
    document.getElementById('wrong-count').innerText = wrong;
    let total = correct + wrong;
    document.getElementById('accuracy').innerText = total > 0 ? ((correct / total) * 100).toFixed(1) : 0;
});
</script>

</body>
</html>
