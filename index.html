<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>BCC Proficiency Test - Project Edition</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; padding: 20px; text-align: center; }
        .test-container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #1a73e8; border-bottom: 2px solid #1a73e8; padding-bottom: 10px; }
        
        /* সুতন্বীএমজে ফন্ট ল্যাপটপে থাকলে এটি হুবহু পরীক্ষার হলের মতো দেখাবে */
        #passage-box, #typing-input { 
            font-family: 'SutonnyMJ', 'SolaimanLipi', Arial; 
            font-size: 26px; line-height: 1.6; text-align: left;
        }
        #passage-box { background: #fff9c4; padding: 20px; border: 1px solid #fbc02d; border-radius: 8px; margin-bottom: 20px; user-select: none; }
        
        textarea { width: 100%; height: 150px; padding: 15px; border: 2px solid #1a73e8; border-radius: 8px; outline: none; box-sizing: border-box; }
        
        .stats { display: flex; justify-content: space-around; margin: 20px 0; background: #202124; color: white; padding: 15px; border-radius: 8px; }
        .btn { background: #28a745; color: white; padding: 12px 35px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 16px; }
        
        .correct { color: #28a745; }
        .wrong { color: #d93025; text-decoration: underline; font-weight: bold; }
        #result-box { display: none; margin-top: 20px; text-align: left; border-top: 2px dashed #ccc; padding-top: 20px; }
    </style>
</head>
<body>

<div class="test-container">
    <h2>কম্পিউটার টাইপিং দক্ষতা পরীক্ষা (BCC Standard)</h2>
    
    <div class="stats">
        <div>সময় বাকি: <span id="timer">০৫:০০</span></div>
        <div>গতি (WPM): <span id="wpm">০</span></div>
        <div>নির্ভুলতা: <span id="accuracy">০</span>%</div>
    </div>

    <div id="passage-box">২০১৪ ও ২০১৬ সালের পর আবারও চ্যাম্পিয়ন্স লিগ কোয়ার্টার ফাইনালে আতলেতিকো মাদ্রিদের কাছে হেরে গেল বার্সা।</div>

    <textarea id="typing-input" placeholder="বিজয় ক্লাসিক (Ctrl+Alt+B) দিয়ে এখানে টাইপ করুন..." oninput="startTimer()"></textarea>

    <div style="margin-top: 20px;">
        <button class="btn" onclick="processFinalResult()">ফিনিশ পরীক্ষা</button>
    </div>

    <div id="result-box">
        <h3 style="color:#1a73e8">টাইপিং বিশ্লেষণ:</h3>
        <div id="analysis-text"></div>
    </div>
</div>

<script>
    const passage = "২০১৪ ও ২০১৬ সালের পর আবারও চ্যাম্পিয়ন্স লিগ কোয়ার্টার ফাইনালে আতলেতিকো মাদ্রিদের কাছে হেরে গেল বার্সা।";
    let timerOn = false;
    let timeLeft = 300;

    // বিসিসি লজিক: এটি বিজয় কিবোর্ডের ইংরেজি সংকেতকে বাংলায় রূপান্তর করে মেলায়
    function bccSmartConverter(str) {
        if (!str) return "";
        const bijoyMap = {
            'a':'ঋ','b':'ন','c':'এ','d':'ি','e':'ড','f':'া','g':'হ','h':'ব','i':'হ','j':'র','k':'ক','l':'ত','m':'ম','n':'স','o':'গ','p':'ড়','q':'ঙ','r':'প','s':'ু','t':'ট','u':'ঝ','v':'ল','w':'য়','x':'ও','y':'চ','z':'য',
            'A':'ৃ','B':'ণ','C':'ঐ','D':'ী','E':'ঢ','F':'অ','G':'।','H':'ভ','I':'ক্ষ','J':'্র','K':'খ','L':'থ','M':'উ','N':'ষ','O':'ঘ','P':'ঢ়','Q':'ং','R':'ফ','S':'ূ','T':'ঠ','U':'ঝ','V':'ল','W':'য়','X':'ৗ','Y':'ছ','Z':'্য',
            '1':'১','2':'২','3':'৩','4':'৪','5':'৫','6':'৬','7':'৭','8':'৮','9':'৯','0':'০'
        };

        let output = "";
        for (let i = 0; i < str.length; i++) {
            let ch = str[i], next = str[i+1];
            // ই-কার (d), এ-কার (c) পজিশন ঠিক করা (বিজয় টু ইউনিকোড লজিক)
            if ((ch === 'd' || ch === 'c' || ch === 'C') && next) {
                output += (bijoyMap[next] || next) + (bijoyMap[ch] || ch);
                i++;
            } else {
                output += bijoyMap[ch] || ch;
            }
        }
        // র্য এবং অন্যান্য যুক্তবর্ণ নরমালাইজেশন
        return output.normalize('NFC').replace(/র‌্য/g, 'র্য');
    }

    function startTimer() {
        if (!timerOn) {
            timerOn = true;
            let countdown = setInterval(() => {
                timeLeft--;
                let m = Math.floor(timeLeft / 60);
                let s = timeLeft % 60;
                document.getElementById('timer').innerText = `${m}:${s < 10 ? '০'+s : s}`;
                if (timeLeft <= 0) { clearInterval(countdown); processFinalResult(); }
            }, 1000);
        }
    }

    function processFinalResult() {
        const inputVal = document.getElementById('typing-input').value.trim();
        const inputWords = inputVal.split(/\s+/);
        const targetWords = passage.split(/\s+/);
        
        let correctWords = 0;
        let resultHTML = "";

        targetWords.forEach((tWord, index) => {
            let uWordRaw = inputWords[index] || "";
            // যদি ইউনিকোডে না মেলে, তবে বিজয় টু ইউনিকোড কনভার্ট করে চেক করো
            let uWordConverted = bccSmartConverter(uWordRaw);
            let targetNormalized = tWord.normalize('NFC').trim();

            if (uWordConverted === targetNormalized || uWordRaw === targetNormalized) {
                if (uWordRaw !== "") {
                    resultHTML += `<span class="correct">${uWordRaw} </span>`;
                    correctWords++;
                }
            } else if (uWordRaw !== "") {
                resultHTML += `<span class="wrong">${uWordRaw}</span> `;
            }
        });

        const accuracy = ((correctWords / targetWords.length) * 100).toFixed(2);
        const wpm = Math.round((inputVal.length / 5) / ((300 - timeLeft) / 60)) || 0;

        document.getElementById('wpm').innerText = wpm;
        document.getElementById('accuracy').innerText = accuracy;
        document.getElementById('analysis-text').innerHTML = resultHTML;
        document.getElementById('result-box').style.display = "block";
        document.getElementById('typing-input').disabled = true;
    }
</script>

</body>
</html>
