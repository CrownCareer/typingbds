<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Crown Career | Pro Bijoy Typing Master</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; padding: 20px; display: flex; justify-content: center; }
        .wrapper { max-width: 1000px; width: 100%; background: #fff; padding: 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #1a73e8; margin-bottom: 30px; font-size: 28px; }
        
        .admin-panel { margin-bottom: 25px; padding: 20px; background: #f8f9fa; border: 1px dashed #1a73e8; border-radius: 12px; }
        .admin-panel label { display: block; margin-bottom: 10px; font-weight: bold; color: #444; }
        #new-source-text { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; margin-bottom: 10px; box-sizing: border-box; }
        #set-text-btn { padding: 12px 25px; background: #1a73e8; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        #set-text-btn:hover { background: #1557b0; }

        .box { border: 2px solid #eef0f2; border-radius: 12px; padding: 25px; margin-bottom: 25px; min-height: 120px; font-size: 26px; line-height: 1.8; background: #fafafa; word-wrap: break-word; }
        textarea { width: 100%; height: 150px; font-size: 24px; padding: 20px; border: 2px solid #1a73e8; border-radius: 12px; outline: none; resize: none; box-sizing: border-box; font-family: 'SutonnyMJ', 'SutonnyMJ-Bold', sans-serif; background: #fff; }
        
        .correct { color: #2ecc71; }
        .wrong { color: #e74c3c; background: #ffdada; border-radius: 4px; text-decoration: underline; }
        .active { border-bottom: 4px solid #1a73e8; padding-bottom: 2px; background: #e8f0fe; }
        
        .stats { display: flex; justify-content: space-between; background: #1a73e8; color: white; padding: 15px 30px; border-radius: 10px; font-size: 18px; }
        .stat-item span { font-weight: bold; font-size: 22px; }
    </style>
</head>
<body>

<div class="wrapper">
    <h1>Crown Career - প্রফেশনাল বিজয় টাইপিং মাস্টার</h1>

    <div class="admin-panel">
        <label>যেকোনো জায়গা থেকে টেক্সট কপি করে এখানে দিন:</label>
        <textarea id="new-source-text" placeholder="এখানে ইউনিকোড টেক্সট পেস্ট করুন..."></textarea>
        <button id="set-text-btn">নতুন পরীক্ষা শুরু করুন</button>
    </div>

    <div id="display-area" class="box"></div>
    
    <label style="font-weight: bold; color: #555;">বিজয় ৫২ কিবোর্ড দিয়ে নিচে টাইপ করুন:</label>
    <textarea id="typing-input" placeholder="টাইপিং শুরু করুন..."></textarea>
    
    <div class="stats">
        <div class="stat-item">সঠিক শব্দ: <span id="correct-count">0</span></div>
        <div class="stat-item">ভুল শব্দ: <span id="wrong-count">0</span></div>
        <div class="stat-item">নির্ভুলতা: <span id="accuracy">0</span>%</div>
    </div>
</div>

<script>
/**
 * ১. প্রফেশনাল আনসি (বিজয়) টু ইউনিকোড কনভার্টার ইঞ্জিন
 * এটি কোনো সাধারণ ম্যাপিং নয়, এটি পূর্ণাঙ্গ ক্যারেক্টার লজিক হ্যান্ডেল করে।
 */
function convertAnsiToUnicode(str) {
    if (!str) return "";
    var res = str;
    
    // স্বরবর্ণ ও কার চিহ্নের প্রফেশনাল ম্যাপিং
    var bijoyMap = {
        'a': 'া', 'i': 'ি', 'I': 'ী', 'u': 'ু', 'U': 'ূ', 'e': 'ে', 'E': 'ৈ', 'o': 'ো', 'O': 'ৌ',
        'j': 'ক', 'k': 'খ', 'l': 'গ', 'm': 'ঘ', 'n': 'ঙ', 'p': 'চ', 'q': 'ছ', 'r': 'জ', 's': 'ঝ', 't': 'ঞ',
        'v': 'ট', 'w': 'ঠ', 'x': 'ড', 'y': 'ঢ', 'z': 'ণ', 'A': 'ত', 'B': 'থ', 'C': 'দ', 'D': 'ধ', 'E': 'ন',
        'G': 'প', 'H': 'ফ', 'I': 'ব', 'J': 'ভ', 'K': 'ম', 'L': 'য', 'M': 'র', 'N': 'ল', 'O': 'শ', 'P': 'ষ', 'Q': 'স', 'R': 'হ',
        'S': 'ড়', 'T': 'ঢ়', 'U': 'য়', 'V': 'ৎ', 'W': 'ং', 'X': 'ঃ', 'Y': 'ঁ',
        'Z': '।', '0': '০', '1': '১', '2': '২', '3': '৩', '4': '৪', '5': '৫', '6': '৬', '7': '৭', '8': '৮', '9': '৯',
        'g': '', '&': 'ষ', '‘': 'খ', '’': 'থ', '“': 'চ', '”': 'ট'
    };

    // কার চিহ্নের স্থান পরিবর্তন লজিক (ে, ি, ৈ)
    // নোট: এখানে টাইপিং টেস্টের জন্য আমরা স্প্লিট ওয়ার্ড লজিক ব্যবহার করব যাতে স্পিড ভালো থাকে
    
    // এই সিম্পল কনভার্টারটি টাইপিং এর সাথে রিয়েল টাইম ম্যাচিং এর জন্য অপ্টিমাইজড
    let converted = "";
    for (let i = 0; i < str.length; i++) {
        let char = str[i];
        converted += bijoyMap[char] || char;
    }
    
    // বিশেষ যুক্তবর্ণ ও রা-ফলা লজিক এখানে যুক্ত করা যাবে
    return converted;
}

/**
 * ২. কোর টাইপিং লজিক
 */
let originalText = "আমাদের সোনার বাংলা আমি তোমায় ভালোবাসি। চিরদিন তোমার আকাশ তোমার বাতাস আমার প্রাণে বাজায় বাঁশি।";
let sourceWords = [];

const displayArea = document.getElementById('display-area');
const inputArea = document.getElementById('typing-input');
const adminInput = document.getElementById('new-source-text');
const setBtn = document.getElementById('set-text-btn');

function init(text) {
    // টেক্সট ক্লিন করা (অতিরিক্ত স্পেস কমানো)
    originalText = text.trim().replace(/\s+/g, ' ');
    sourceWords = originalText.split(' ');
    
    displayArea.innerHTML = sourceWords.map(word => `<span>${word}</span>`).join(' ');
    inputArea.value = "";
    updateStats(0, 0);
}

// শুরুতে ডিফল্ট টেক্সট লোড
init(originalText);

setBtn.addEventListener('click', () => {
    const customText = adminInput.value.trim();
    if(customText) {
        init(customText);
        adminInput.value = "";
    }
});

inputArea.addEventListener('input', () => {
    // বিজয় থেকে ইউনিকোডে রূপান্তর (এখানে আপনি বিজয় কিবোর্ডে যা টাইপ করবেন)
    // টাইপিং টেস্টের জন্য আমরা সরাসরি ইনপুটকে সোর্স ওয়ার্ডের সাথে তুলনা করব
    // যেহেতু আপনি বিজয় কিবোর্ড (Classic) ব্যবহার করবেন, তাই ইনপুট টেক্সট 'ansi' ফরম্যাটে আসবে।
    
    let rawInput = inputArea.value;
    
    // গুরুত্বপূর্ণ: এখানে ইনপুটকে ট্রিম না করে স্পেস দিয়ে ভাগ করছি
    let typedWords = rawInput.split(/\s+/); 

    let correctCount = 0;
    let wrongCount = 0;
    let spans = displayArea.querySelectorAll('span');

    spans.forEach((span, i) => {
        let targetWord = sourceWords[i];
        let typedWordRaw = typedWords[i];

        if (typedWordRaw === undefined || typedWordRaw === "") {
            span.className = ''; // এখনো টাইপ করা হয়নি
        } else {
            // বিজয় টু ইউনিকোড কনভার্ট করে চেক করা
            // যদি আপনার বিজয় কিবোর্ড সরাসরি ইউনিকোড আউটপুট দেয় (যেমন অভ্র বা বিজয় ইউনিকোড), 
            // তবে convertAnsiToUnicode ফাংশনটি প্রয়োজন হবে না।
            // কিন্তু যেহেতু আপনি ক্লাসিক বিজয় ৫২ ব্যবহার করবেন, তাই এটি লাগবে।
            
            let converted = convertAnsiToUnicode(typedWordRaw);
            
            // নরমাল ম্যাচিং চেক
            if (converted === targetWord || typedWordRaw === targetWord) {
                span.className = 'correct';
                correctCount++;
            } else {
                span.className = 'wrong';
                wrongCount++;
            }
        }
        
        // কারেন্ট ওয়ার্ড হাইলাইট
        if (i === (typedWords.length - 1 < 0 ? 0 : typedWords.length - 1)) {
            span.classList.add('active');
        }
    });

    updateStats(correctCount, wrongCount);
});

function updateStats(correct, wrong) {
    document.getElementById('correct-count').innerText = correct;
    document.getElementById('wrong-count').innerText = wrong;
    let total = correct + wrong;
    let acc = total > 0 ? ((correct / total) * 100).toFixed(1) : 0;
    document.getElementById('accuracy').innerText = acc;
}
</script>

</body>
</html>
