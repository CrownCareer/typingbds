<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Official Typing Exam System - Final</title>
    <style>
        :root { --blue: #0056b3; --green: #28a745; --red: #dc3545; --bg: #f4f7f6; --teal: #17a2b8; }
        html, body { height: 100%; margin: 0; font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); overflow-x: hidden; }
        .container { display: flex; flex-direction: column; min-height: 100vh; padding: 20px; box-sizing: border-box; }
        .box { background: #fff; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); padding: 20px; margin-bottom: 10px; }
        .hidden { display: none !important; }
        
        .auth-card { max-width: 400px; margin: 50px auto; text-align: center; border-top: 5px solid var(--blue); }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .btn-main { background: var(--blue); color: white; padding: 12px; border: none; border-radius: 5px; width: 100%; cursor: pointer; font-weight: bold; }
        
        .result-header { color: #004085; text-align: center; font-size: 24px; margin-bottom: 20px; font-weight: bold; border-bottom: 2px solid #eee; padding-bottom: 10px;}
        .result-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; }
        .card { padding: 12px; border: 1px solid #ddd; background: #fff; border-radius: 8px; font-size: 14px; }
        .card h4 { margin: -12px -12px 10px -12px; padding: 10px; font-size: 15px; border-radius: 8px 8px 0 0; border-bottom: 1px solid #eee; }
        
        #passage-stable, #t-input, #user-compare-text { 
            font-family: 'SutonnyMJ', Arial, sans-serif; 
        }

        #passage-stable { font-size: 28px; line-height: 1.8; height: 280px; overflow-y: auto; text-align: justify; user-select: none; margin-bottom: 20px; }
        .input-box { border: 2px solid var(--blue); border-radius: 8px; padding: 15px; background: #fff; margin-top: 10px; }
        textarea { width: 100%; height: 110px; font-size: 26px; border: none; outline: none; resize: none; }
        .error-highlight { color: #dc3545; text-decoration: underline; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div id="page-login" class="box auth-card">
        <h2 style="color: var(--blue);">লগইন করুন</h2>
        <input type="text" id="login-user" placeholder="আপনার নাম">
        <button class="btn-main" onclick="doLogin()">শুরু করুন</button>
    </div>

    <div id="page-exam" class="hidden">
        <div class="box" style="display: flex; justify-content: space-between; align-items: center;">
            <div>👤 নাম: <b><span id="display-name"></span></b></div>
            <div style="color: var(--red); font-size: 20px; font-weight: bold;">সময়: <span id="timer">00:00</span></div>
        </div>
        <div id="passage-stable" class="box"><div id="p-text"></div></div>
        <div class="input-box">
            <textarea id="t-input" placeholder="বিজয় ক্লাসিক সিলেক্ট করে টাইপ করুন..." oninput="startCount()" onpaste="return false;"></textarea>
        </div>
        <div style="text-align: right; margin-top: 15px;">
            <button class="btn-main" style="width: auto; background: var(--green); padding: 10px 40px;" onclick="finishExam()">Go to Finish</button>
        </div>
    </div>

    <div id="page-result" class="box hidden">
        <div class="result-header">🔍 টাইপিং ফলাফল ও বিস্তারিত</div>
        <div class="result-grid">
            <div class="card">
                <h4>তথ্য</h4>
                <p>🚀 WPM: <b id="r-wpm"></b></p>
                <p>🎯 Accuracy: <b id="r-acc"></b></p>
            </div>
            <div class="card">
                <h4>গণনা</h4>
                <p>📊 Character: <span id="r-char"></span></p>
                <p>✅ সঠিক: <span id="r-cor"></span></p>
            </div>
        </div>
        <div id="user-compare-text" class="box" style="line-height:1.8; font-size:22px;"></div>
        <center><button class="btn-main" style="width: 200px; margin-top:20px;" onclick="location.reload()">আবার চেষ্টা করুন</button></center>
    </div>
</div>

<script>
    let passage = "২০১৪ ও ২০১৬ সালের পর আবারও চ্যাম্পিয়ন্স লিগ কোয়ার্টার ফাইনালে আতলেতিকো মাদ্রিদের কাছে হেরে গেল বার্সা।";
    let examDuration = 300, timeLeft = examDuration, timerOn = false, timerInt;

    document.getElementById('p-text').innerText = passage;

    // --- BIJOY TO UNICODE ENGINE ---
    function convertBijoyToUnicode(str) {
        if (!str) return "";
        let res = str;
        
        // ১. কার চিহ্নের পজিশন ঠিক করা (বিজয় ই-কার আগে থাকে, ইউনিকোডে পরে)
        res = res.replace(/ি([^্])|ে([^্])|ৈ([^্])/g, "$1$2$3"); // এটি একটি সিম্পল লজিক
        
        // ২. মূল ক্যারেক্টার ম্যাপিং
        const map = {
            'a':'ঋ', 'b':'ন', 'c':'এ', 'd':'ি', 'e':'ড', 'f':'া', 'g':'হ', 'h':'ব', 'i':'হ', 'j':'র', 'k':'ক', 'l':'ত', 'm':'ম', 'n':'স', 'o':'গ', 'p':'ড়', 'q':'ঙ', 'r':'প', 's':'ু', 't':'ট', 'u':'ঝ', 'v':'ল', 'w':'য়', 'x':'ও', 'y':'চ', 'z':'য',
            'A':'ৃ', 'B':'ণ', 'C':'ঐ', 'D':'ী', 'E':'ঢ', 'F':'অ', 'G':'।', 'H':'ভ', 'I':'ক্ষ', 'J':'্র', 'K':'খ', 'L':'থ', 'M':'উ', 'N':'ষ', 'O':'ঘ', 'P':'ঢ়', 'Q':'ং', 'R':'ফ', 'S':'ূ', 'T':'ঠ', 'U':'ঝ', 'V':'ল', 'W':'য়', 'X':'ৗ', 'Y':'ছ', 'Z':'্য',
            '1':'১', '2':'২', '3':'৩', '4':'৪', '5':'৫', '6':'৬', '7':'৭', '8':'৮', '9':'৯', '0':'০', '|':'।'
        };
        
        return res.split('').map(c => map[c] || c).join('');
    }

    // --- NORMALIZER ---
    // এটি ইউনিকোড এবং বিজয় উভয় টেক্সটকে একদম বেসিক লেভেলে নিয়ে আসে যাতে তুলনা সহজ হয়
    function normalize(text) {
        return text.replace(/[\u200B-\u200D\uFEFF]/g, "").trim();
    }

    function startCount() {
        if(!timerOn) {
            timerOn = true;
            timerInt = setInterval(() => {
                timeLeft--;
                let m = Math.floor(timeLeft/60), s = timeLeft%60;
                document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                if(timeLeft <= 0) finishExam();
            }, 1000);
        }
    }

    function finishExam() {
        clearInterval(timerInt);
        const rawInput = document.getElementById('t-input').value;
        const iWords = rawInput.trim().split(/\s+/);
        const pWords = passage.trim().split(/\s+/);

        let correctChars = 0, comparisonHTML = "";

        pWords.forEach((word, idx) => {
            const userWord = iWords[idx] || "";
            const convUser = normalize(convertBijoyToUnicode(userWord));
            const normPass = normalize(word);

            // যদি সরাসরি ইংরেজি (বিজয় ক্লাসিক) অথবা কনভার্ট করার পর বাংলা মিলে যায়
            if (convUser === normPass || userWord === normPass) {
                comparisonHTML += `<span style="color:black">${userWord} </span>`;
                correctChars += word.length + 1;
            } else if (userWord !== "") {
                comparisonHTML += `<span class="error-highlight">${userWord}</span> `;
            }
        });

        const timeSpent = examDuration - timeLeft;
        const wpm = Math.round((rawInput.length / 5) / (timeSpent / 60 || 1));
        let accuracy = (rawInput.length > 0) ? (correctChars / rawInput.length) * 100 : 0;
        
        document.getElementById('r-wpm').innerText = wpm;
        document.getElementById('r-acc').innerText = (accuracy > 100 ? 100 : accuracy).toFixed(2) + "%";
        document.getElementById('r-char').innerText = rawInput.length;
        document.getElementById('r-cor').innerText = correctChars;
        document.getElementById('user-compare-text').innerHTML = comparisonHTML;
        document.getElementById('r-date').innerText = new Date().toLocaleDateString();
        document.getElementById('r-time-taken').innerText = Math.floor(timeSpent/60) + ":" + (timeSpent%60).toString().padStart(2,'0');

        showPage('page-result');
    }

    function showPage(id) {
        document.querySelectorAll('.container > div').forEach(d => d.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    function doLogin() {
        const u = document.getElementById('login-user').value;
        if(u) {
            document.getElementById('display-name').innerText = u;
            showPage('page-exam');
        }
    }
</script>
</body>
</html>
