<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>BCC Style Typing Test</title>
    <style>
        :root { --blue: #0056b3; --green: #28a745; --red: #dc3545; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f7f6; padding: 20px; }
        .box { background: #fff; padding: 25px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        
        /* সুতন্বীএমজে ফন্ট পিসিতে ইনস্টল থাকতে হবে */
        #p-text, #t-input, #user-compare-text { 
            font-family: 'SutonnyMJ', 'Arial', sans-serif; 
            font-size: 26px; line-height: 1.8;
        }

        textarea { width: 100%; height: 130px; border: 2px solid var(--blue); border-radius: 8px; padding: 15px; outline: none; resize: none; }
        .error { color: var(--red); text-decoration: underline; font-weight: bold; }
        .correct { color: #000; }
        .hidden { display: none !important; }
        .btn { background: var(--green); color: white; padding: 12px 50px; border: none; border-radius: 5px; cursor: pointer; font-size: 18px; }
    </style>
</head>
<body>

<div id="exam-page">
    <div class="box">
        <div id="p-text">২০১৪ ও ২০১৬ সালের পর আবারও চ্যাম্পিয়ন্স লিগ কোয়ার্টার ফাইনালে আতলেতিকো মাদ্রিদের কাছে হেরে গেল বার্সা।</div>
    </div>
    <div class="box">
        <textarea id="t-input" placeholder="বিজয় ক্লাসিক (SutonnyMJ) মোডে টাইপ করুন..."></textarea>
    </div>
    <div style="text-align: right;">
        <button class="btn" onclick="processResult()">Go to Finish</button>
    </div>
</div>

<div id="result-page" class="box hidden">
    <h2 style="text-align: center; color: var(--blue);">টাইপিং ফলাফল (BCC Standard)</h2>
    <div id="stats" style="display: flex; justify-content: space-around; font-size: 22px; margin-bottom: 20px; font-weight: bold;"></div>
    <div id="user-compare-text" class="box" style="background: #f9f9f9; border: 1px solid #ddd;"></div>
    <center><button class="btn" style="background: var(--blue);" onclick="location.reload()">আবার চেষ্টা করুন</button></center>
</div>

<script>
    const passage = "২০১৪ ও ২০১৬ সালের পর আবারও চ্যাম্পিয়ন্স লিগ কোয়ার্টার ফাইনালে আতলেতিকো মাদ্রিদের কাছে হেরে গেল বার্সা।";

    // BCC স্টাইল রূপান্তর ইঞ্জিন: যা 'mvtj' কে 'সালে' হিসেবে চিনবে
    function convertToCompare(str) {
        if (!str) return "";
        const bijoyMap = {
            'a':'ঋ', 'b':'ন', 'c':'এ', 'd':'ি', 'e':'ড', 'f':'া', 'g':'হ', 'h':'ব', 'i':'হ', 'j':'র', 'k':'ক', 'l':'ত', 'm':'ম', 'n':'স', 'o':'গ', 'p':'ড়', 'q':'ঙ', 'r':'প', 's':'ু', 't':'ট', 'u':'ঝ', 'v':'ল', 'w':'য়', 'x':'ও', 'y':'চ', 'z':'য',
            'A':'ৃ', 'B':'ণ', 'C':'ঐ', 'D':'ী', 'E':'ঢ', 'F':'অ', 'G':'।', 'H':'ভ', 'I':'ক্ষ', 'J':'্র', 'K':'খ', 'L':'থ', 'M':'উ', 'N':'ষ', 'O':'ঘ', 'P':'ঢ়', 'Q':'ং', 'R':'ফ', 'S':'ূ', 'T':'ঠ', 'U':'ঝ', 'V':'ল', 'W':'য়', 'X':'ৗ', 'Y':'ছ', 'Z':'্য',
            '1':'১', '2':'২', '3':'৩', '4':'৪', '5':'৫', '6':'৬', '7':'৭', '8':'৮', '9':'৯', '0':'০', '&':'ষ', '`':'~'
        };

        let result = "";
        for (let i = 0; i < str.length; i++) {
            let char = str[i], next = str[i+1];
            // ই-কার (d), এ-কার (c), ঐ-কার (C) এর পজিশন ফিক্স
            if (['d', 'c', 'C'].includes(char) && next) {
                result += (bijoyMap[next] || next) + (bijoyMap[char] || char);
                i++;
            } else {
                result += bijoyMap[char] || char;
            }
        }
        // Unicode Normalization (BCC সিস্টেমে এটি অত্যন্ত জরুরি)
        return result.normalize('NFC').replace(/র‌্য/g, 'র্য').trim();
    }

    function processResult() {
        const userInput = document.getElementById('t-input').value;
        const iWords = userInput.trim().split(/\s+/);
        const pWords = passage.trim().split(/\s+/);

        let correctWords = 0;
        let comparisonHTML = "";

        pWords.forEach((word, idx) => {
            const userRaw = iWords[idx] || "";
            const converted = convertToCompare(userRaw);
            const target = word.normalize('NFC').trim();

            if (converted === target && target !== "") {
                comparisonHTML += `<span class="correct">${userRaw} </span>`;
                correctWords++;
            } else if (userRaw !== "") {
                comparisonHTML += `<span class="error">${userRaw}</span> `;
            }
        });

        const accuracy = ((correctWords / pWords.length) * 100).toFixed(2);
        document.getElementById('stats').innerHTML = `WPM: ${Math.round(userInput.length/5)} | Accuracy: ${accuracy}%`;
        document.getElementById('user-compare-text').innerHTML = comparisonHTML;
        
        document.getElementById('exam-page').classList.add('hidden');
        document.getElementById('result-page').classList.remove('hidden');
    }
</script>

</body>
</html>
