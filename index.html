<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>BCC Typing Simulator - Final Fix</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        h2 { color: #0056b3; border-bottom: 2px solid #0056b3; padding-bottom: 10px; }
        
        #passage-box, #typing-area, #analysis { 
            font-family: 'SutonnyMJ', 'Arial', serif; 
            font-size: 26px; line-height: 1.6; text-align: left;
        }
        
        #passage-box { background: #fff9c4; padding: 20px; border: 1px solid #fbc02d; border-radius: 8px; margin-bottom: 20px; }
        textarea { width: 100%; height: 160px; padding: 15px; border: 2px solid #0056b3; border-radius: 8px; outline: none; box-sizing: border-box; }
        
        .correct { color: #28a745 !important; font-weight: bold; }
        .wrong { color: #d93025; text-decoration: underline; font-weight: bold; }
        .stats-bar { display: flex; justify-content: space-around; background: #333; color: white; padding: 15px; border-radius: 8px; margin-bottom: 20px; font-weight: bold; font-size: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2>কম্পিউটার টাইপিং দক্ষতা পরীক্ষা (BCC Standard)</h2>
    
    <div class="stats-bar">
        <div>গতি: <span id="wpm">০</span> WPM</div>
        <div>নির্ভুলতা: <span id="accuracy">০</span>%</div>
        <div>সঠিক শব্দ: <span id="correct-count">০</span></div>
    </div>

    <div id="passage-box">২০১৪ ও ২০১৬ সালের পর আবারও চ্যাম্পিয়ন্স লিগ কোয়ার্টার ফাইনালে আতলেতিকো মাদ্রিদের কাছে হেরে গেল বার্সা।</div>

    <textarea id="typing-area" placeholder="বিজয় ক্লাসিক (Ctrl+Alt+B) মোডে টাইপ করুন..." oninput="bccLogic()"></textarea>

    <div id="analysis" style="margin-top: 25px; border-top: 1px dashed #ccc; padding-top: 20px;"></div>
</div>

<script>
    const targetPassage = "২০১৪ ও ২০১৬ সালের পর আবারও চ্যাম্পিয়ন্স লিগ কোয়ার্টার ফাইনালে আতলেতিকো মাদ্রিদের কাছে হেরে গেল বার্সা।";

    // বিসিসি হাই-স্পিড ম্যাপিং ইঞ্জিন (এটি আপনার ছবির সমস্যা সমাধান করবে)
    function bccDecoder(str) {
        if (!str) return "";
        const m = {
            'a':'ঋ','b':'ন','c':'এ','d':'ি','e':'ড','f':'া','g':'হ','h':'ব','i':'হ','j':'র','k':'ক','l':'ত','m':'ম','n':'স','o':'গ','p':'ড়','q':'ঙ','r':'প','s':'ু','t':'ট','u':'ঝ','v':'ল','w':'য়','x':'ও','y':'চ','z':'য',
            'A':'ৃ','B':'ণ','C':'ঐ','D':'ী','E':'ঢ','F':'অ','G':'।','H':'ভ','I':'ক্ষ','J':'্র','K':'খ','L':'থ','M':'উ','N':'ষ','O':'ঘ','P':'ঢ়','Q':'ং','R':'ফ','S':'ূ','T':'ঠ','U':'ঝ','V':'ল','W':'য়','X':'ৗ','Y':'ছ','Z':'্য',
            '1':'১','2':'২','3':'৩','4':'৪','5':'৫','6':'৬','7':'৭','8':'৮','9':'৯','0':'০','‡':'ে','†':'ে','v':'া','i':'ি'
        };

        let result = "";
        for (let i = 0; i < str.length; i++) {
            let cur = str[i], nxt = str[i+1];
            // কার-চিহ্ন অদলবদল লজিক (বিজয় ক্লাসিক টু ইউনিকোড)
            if (['d', '‡', '†', 'c', 'C', 'i'].includes(cur) && nxt) {
                result += (m[nxt] || nxt) + (m[cur] || cur);
                i++;
            } else {
                result += m[cur] || cur;
            }
        }
        return result.normalize('NFC').replace(/র‌্য/g, 'র্য');
    }

    function bccLogic() {
        const input = document.getElementById('typing-area').value;
        const uWords = input.trim().split(/\s+/);
        const pWords = targetPassage.split(/\s+/);
        
        let correct = 0;
        let html = "টাইপিং বিশ্লেষণ: <br>";

        pWords.forEach((word, index) => {
            let raw = uWords[index] || "";
            let converted = bccDecoder(raw);
            let target = word.normalize('NFC').trim();

            // কড়া চেকিং: সরাসরি অথবা ডিকোড করে মিললে সঠিক
            if ((converted === target || raw === target) && target !== "") {
                html += `<span class="correct">${raw} </span>`;
                correct++;
            } else if (raw !== "") {
                html += `<span class="wrong">${raw}</span> `;
            }
        });

        const acc = ((correct / pWords.length) * 100).toFixed(2);
        document.getElementById('accuracy').innerText = acc;
        document.getElementById('correct-count').innerText = correct;
        document.getElementById('analysis').innerHTML = html;
        document.getElementById('wpm').innerText = Math.round(input.length / 5) || 0;
    }
</script>

</body>
</html>
