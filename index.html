<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>BCC Style Final Fix</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; padding: 20px; }
        .box { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        
        /* এই অংশটি আপনার স্ক্রিনে বাংলা দেখাবে */
        #p-text, #t-input, #display-text { 
            font-family: 'SutonnyMJ', 'SolaimanLipi', sans-serif; 
            font-size: 26px; line-height: 1.8;
        }
        
        textarea { width: 100%; height: 120px; border: 2px solid #0056b3; border-radius: 8px; padding: 15px; outline: none; }
        .correct { color: black; }
        .wrong { color: #dc3545; text-decoration: underline; font-weight: bold; }
    </style>
</head>
<body>

<div class="box">
    <strong>প্যাসেজটি দেখে টাইপ করুন:</strong>
    <div id="p-text">২০১৪ ও ২০১৬ সালের পর আবারও চ্যাম্পিয়ন্স লিগ কোয়ার্টার ফাইনালে আতলেতিকো মাদ্রিদের কাছে হেরে গেল বার্সা।</div>
</div>

<div class="box">
    <textarea id="t-input" placeholder="বিজয় ক্লাসিক (Ctrl+Alt+B) দিয়ে এখানে টাইপ করুন..." oninput="checkTyping()"></textarea>
</div>

<div class="box" id="result-box">
    <strong>লাইভ স্ট্যাটাস:</strong>
    <div id="display-text"></div>
</div>

<script>
    const passage = "২০১৪ ও ২০১৬ সালের পর আবারও চ্যাম্পিয়ন্স লিগ কোয়ার্টার ফাইনালে আতলেতিকো মাদ্রিদের কাছে হেরে গেল বার্সা।";

    function checkTyping() {
        const userInput = document.getElementById('t-input').value;
        const uWords = userInput.split(/\s+/);
        const pWords = passage.split(/\s+/);
        
        let html = "";
        let correctWords = 0;

        pWords.forEach((word, i) => {
            let uWord = uWords[i] || "";
            
            // BCC-র মতো সরাসরি ক্যারেক্টার কম্পারিজন
            // যদি ফন্ট ঠিক থাকে, তবে বিজয় ক্লাসিক ইনপুট সরাসরি ইউনিকোড প্যাসেজের সাথে মিলবে
            if (uWord === word && uWord !== "") {
                html += `<span class="correct">${uWord} </span>`;
                correctWords++;
            } else if (uWord !== "") {
                html += `<span class="wrong">${uWord}</span> `;
            }
        });
        
        document.getElementById('display-text').innerHTML = html;
        
        // টাইটেল বারে লাইভ নির্ভুলতা দেখানো
        let accuracy = (correctWords / pWords.length) * 100;
        if(userInput.length > 0) {
            console.log("Accuracy: " + accuracy.toFixed(2) + "%");
        }
    }
</script>

</body>
</html>
