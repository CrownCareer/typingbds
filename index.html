<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>BCC Standard Typing Fix</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; padding: 20px; text-align: center; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        #passage, #typing-area, #result { 
            font-family: 'SutonnyMJ', 'SolaimanLipi', Arial; 
            font-size: 26px; line-height: 1.6; text-align: left;
        }
        
        #passage { background: #fff9c4; padding: 20px; border: 1px solid #fbc02d; border-radius: 8px; margin-bottom: 25px; }
        textarea { width: 100%; height: 180px; padding: 15px; border: 2px solid #1a73e8; border-radius: 8px; outline: none; box-sizing: border-box; }
        
        .correct { color: #28a745 !important; font-weight: bold; border-bottom: 2px solid #28a745; }
        .wrong { color: #d93025; text-decoration: underline; font-weight: bold; }
        #result { margin-top: 20px; border-top: 2px dashed #ccc; padding-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color: #1a73e8;">কম্পিউটার টাইপিং দক্ষতা পরীক্ষা (BCC Standard)</h2>
    
    <div id="passage">২০১৪ ও ২০১৬ সালের পর আবারও চ্যাম্পিয়ন্স লিগ কোয়ার্টার ফাইনালে আতলেতিকো মাদ্রিদের কাছে হেরে গেল বার্সা।</div>

    <textarea id="typing-area" placeholder="বিজয় ক্লাসিক (Ctrl+Alt+B) দিয়ে টাইপ করুন..." oninput="checkTyping()"></textarea>

    <div id="result"></div>
</div>

<script>
    // প্যাসেজটিকে 'Clean' করে নেওয়া (অদৃশ্য ক্যারেক্টার রিমুভ করা)
    const rawText = "২০১৪ ও ২০১৬ সালের পর আবারও চ্যাম্পিয়ন্স লিগ কোয়ার্টার ফাইনালে আতলেতিকো মাদ্রিদের কাছে হেরে গেল বার্সা।";
    const cleanTarget = rawText.normalize('NFC').replace(/[\u200B-\u200D\uFEFF]/g, '');

    function ansiToUnicode(str) {
        if (!str) return "";
        const map = {
            'a':'ঋ','b':'ন','c':'এ','d':'ি','e':'ড','f':'া','g':'হ','h':'ব','i':'হ','j':'র','k':'ক','l':'ত','m':'ম','n':'স','o':'গ','p':'ড়','q':'ঙ','r':'প','s':'ু','t':'ট','u':'ঝ','v':'ল','w':'য়','x':'ও','y':'চ','z':'য',
            'A':'ৃ','B':'ণ','C':'ঐ','D':'ী','E':'ঢ','F':'অ','G':'।','H':'ভ','I':'ও','J':'্র','K':'খ','L':'থ','M':'উ','N':'ষ','O':'ঘ','P':'ঢ়','Q':'ং','R':'ফ','S':'ূ','T':'ঠ','U':'ঝ','V':'ল','W':'য়','X':'ৗ','Y':'ছ','Z':'্য',
            '1':'১','2':'২','3':'৩','4':'৪','5':'৫','6':'৬','7':'৭','8':'৮','9':'৯','0':'০',
            '‡':'ে','†':'ে','v':'া','i':'ি','I':'ও','x':'ও'
        };

        let out = "";
        for (let i = 0; i < str.length; i++) {
            let char = str[i], next = str[i+1];
            // কার-চিহ্ন পজিশন শিফটিং (বিজয় ক্লাসিকের জন্য আবশ্যক)
            if (['d', '‡', '†', 'c', 'C', 'i'].includes(char) && next) {
                out += (map[next] || next) + (map[char] || char);
                i++;
            } else {
                out += map[char] || char;
            }
        }
        return out.normalize('NFC').replace(/র‌্য/g, 'র্য');
    }

    function checkTyping() {
        const input = document.getElementById('typing-area').value;
        const words = input.trim().split(/\s+/);
        const targetWords = cleanTarget.split(/\s+/);
        
        let html = "";
        targetWords.forEach((target, i) => {
            let rawUser = words[i] || "";
            let convertedUser = ansiToUnicode(rawUser);
            let goal = target.normalize('NFC').trim();

            // ডুয়াল চেক: যদি সরাসরি মিলে অথবা কনভার্ট হয়ে মিলে তবেই সবুজ
            if (rawUser !== "" && (convertedUser === goal || rawUser === goal)) {
                html += `<span class="correct">${rawUser} </span>`;
            } else if (rawUser !== "") {
                html += `<span class="wrong">${rawUser}</span> `;
            }
        });
        document.getElementById('result').innerHTML = html;
    }
</script>

</body>
</html>
