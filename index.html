<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Crown Career | Final Typing Engine</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f4f8; padding: 20px; }
        .wrapper { max-width: 900px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .box { border: 2px solid #eee; border-radius: 10px; padding: 20px; margin-bottom: 20px; font-size: 26px; line-height: 1.8; background: #fafafa; }
        textarea { width: 100%; height: 120px; font-size: 24px; padding: 15px; border: 2px solid #1a73e8; border-radius: 10px; outline: none; box-sizing: border-box; }
        .correct { color: #2ecc71; font-weight: bold; }
        .wrong { color: #e74c3c; background: #ffdada; text-decoration: underline; font-weight: bold; }
        .active { border-bottom: 4px solid #1a73e8; background: #e8f0fe; }
        .stats { display: flex; justify-content: space-around; background: #1a73e8; color: white; padding: 15px; border-radius: 10px; margin-top: 20px; font-weight: bold; }
        .admin-panel { margin-bottom: 20px; padding: 15px; background: #eef2f7; border-radius: 10px; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="admin-panel">
        <textarea id="source-input" style="height: 60px; margin-bottom: 10px;" placeholder="পরীক্ষার টেক্সট এখানে দিন (যেকোনো ফরম্যাট)..."></textarea>
        <button onclick="init(document.getElementById('source-input').value)" style="width:100%; padding:10px; cursor:pointer; background:#1a73e8; color:white; border:none; border-radius:5px; font-weight:bold;">পরীক্ষা সেট করুন</button>
    </div>

    <div id="display-area" class="box"></div>
    <textarea id="typing-input" placeholder="টাইপিং শুরু করুন..."></textarea>
    
    <div class="stats">
        <div>সঠিক শব্দ: <span id="correct-count">0</span></div>
        <div>ভুল শব্দ: <span id="wrong-count">0</span></div>
        <div>নির্ভুলতা: <span id="accuracy">0</span>%</div>
    </div>
</div>

<script>
// বিজয় ৫২ ক্লাসিক টু ইউনিকোড ম্যাপিং
const bijoyMap = {'a':'া','i':'ি','I':'ী','u':'ু','U':'ূ','e':'ে','E':'ৈ','o':'ো','O':'ৌ','j':'ক','k':'খ','l':'গ','m':'ঘ','n':'ঙ','p':'চ','q':'ছ','r':'জ','s':'ঝ','t':'ঞ','v':'ট','w':'ঠ','x':'ড','y':'ঢ','z':'ণ','A':'ত','B':'থ','C':'দ','D':'ধ','E':'ন','G':'প','H':'ফ','I':'ব','J':'ভ', 'K':'ম','L':'য','M':'র','N':'ল','O':'শ','P':'ষ','Q':'স','R':'হ','S':'ড়','T':'ঢ়','U':'য়','V':'ৎ','W':'ং','X':'ঃ','Y':'ঁ','Z':'।','g':''};

function solveUnicode(text) {
    if (!text) return "";
    // যদি ইনপুটে ইংরেজি ক্যারেক্টার থাকে (বিজয় ক্লাসিক), তবেই কনভার্ট হবে
    if (!/[\u0980-\u09FF]/.test(text)) {
        let converted = "";
        for (let char of text) { converted += bijoyMap[char] || char; }
        // কার চিহ্নের পজিশন ঠিক করা (ে, ি, ৈ)
        return converted.replace(/ে([ক-হ])/g, '$1ে').replace(/ি([ক-হ])/g, '$1ি').replace(/ৈ([ক-হ])/g, '$1ৈ').normalize('NFC');
    }
    // যদি অলরেডি বাংলা থাকে, তবে শুধু ক্লিন করে রিটার্ন করবে
    return text.normalize('NFC').trim();
}

let sourceWords = [];

function init(text) {
    if(!text) return;
    // আপনার দেয়া সোর্স টেক্সটকেও আগে ইউনিকোডে রূপান্তর করা হচ্ছে
    let unicodeText = solveUnicode(text);
    sourceWords = unicodeText.split(/\s+/);
    document.getElementById('display-area').innerHTML = sourceWords.map(w => `<span>${w}</span>`).join(' ');
    document.getElementById('typing-input').value = "";
    updateStats(0, 0);
}

document.getElementById('typing-input').addEventListener('input', function() {
    let typedRaw = this.value.split(/\s+/);
    let spans = document.querySelectorAll('#display-area span');
    let correct = 0, wrong = 0;

    spans.forEach((span, i) => {
        if (!typedRaw[i]) { span.className = ''; return; }

        // টাইপ করা শব্দ এবং সোর্স শব্দ—উভয়কেই ইউনিকোডে প্রসেস করা হচ্ছে
        let typed = solveUnicode(typedRaw[i]);
        let target = sourceWords[i];

        if (typed === target) {
            span.className = 'correct';
            correct++;
        } else {
            span.className = 'wrong';
            wrong++;
        }
        if (i === typedRaw.length - 1) span.classList.add('active');
    });
    updateStats(correct, wrong);
});

function updateStats(c, w) {
    document.getElementById('correct-count').innerText = c;
    document.getElementById('wrong-count').innerText = w;
    let total = c + w;
    document.getElementById('accuracy').innerText = total > 0 ? ((c / total) * 100).toFixed(1) : 0;
}

// ডিফল্ট টেক্সট
init("আমাদের সোনার বাংলা আমি তোমায় ভালোবাসি।");
</script>

</body>
</html>
