<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Crown Career - BCC Typing Master (Final Fix)</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 950px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        
        #passage-box, #typing-area, #live-analysis { 
            font-family: 'SutonnyMJ', 'SolaimanLipi', Arial; 
            font-size: 26px; line-height: 1.6; text-align: left;
        }
        
        #passage-box { background: #fff9c4; padding: 20px; border: 1px solid #fbc02d; border-radius: 8px; margin-bottom: 25px; }
        textarea { width: 100%; height: 180px; padding: 15px; border: 2px solid #1a73e8; border-radius: 8px; outline: none; box-sizing: border-box; }
        
        .correct { color: #28a745 !important; font-weight: bold; border-bottom: 2px solid #28a745; }
        .wrong { color: #d93025; text-decoration: underline; font-weight: bold; }
        #live-analysis { margin-top: 30px; border-top: 2px dashed #eee; padding-top: 20px; }
        
        .stats { display: flex; justify-content: space-around; background: #333; color: white; padding: 15px; border-radius: 8px; margin-bottom: 20px; font-size: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color: #1a73e8; text-align: center;">কম্পিউটার টাইপিং দক্ষতা পরীক্ষা (BCC Standard)</h2>
    
    <div class="stats">
        <div>সঠিক শব্দ: <span id="correct-words">০</span></div>
        <div>নির্ভুলতা: <span id="accuracy">০.০০</span>%</div>
    </div>

    <div id="passage-box">২০১৪ ও ২০১৬ সালের পর আবারও চ্যাম্পিয়ন্স লিগ কোয়ার্টার ফাইনালে আতলেতিকো মাদ্রিদের কাছে হেরে গেল বার্সা।</div>

    <textarea id="typing-area" placeholder="বিজয় ক্লাসিক (Ctrl+Alt+B) মোডে টাইপ শুরু করুন..." oninput="bccFinalEngine()"></textarea>

    <div id="live-analysis">বিশ্লেষণ: </div>
</div>

<script>
    // প্যাসেজটিকে 'BCC Standard Unicode' ফরম্যাটে ক্লিন করা
    const targetPassage = "২০১৪ ও ২০১৬ সালের পর আবারও চ্যাম্পিয়ন্স লিগ কোয়ার্টার ফাইনালে আতলেতিকো মাদ্রিদের কাছে হেরে গেল বার্সা।".normalize('NFC');

    function bccAnsiToUni(str) {
        if (!str) return "";
        
        // বিসিসি স্পেশাল ক্যারেক্টার ম্যাপ (আপনার স্ক্রিনশটের ভুলগুলো ফিক্স করার জন্য)
        const map = {
            'a':'ঋ','b':'ন','c':'এ','d':'ি','e':'ড','f':'া','g':'হ','h':'ব','i':'হ','j':'র','k':'ক','l':'ত','m':'ম','n':'স','o':'গ','p':'ড়','q':'ঙ','r':'প','s':'ু','t':'ট','u':'ঝ','v':'ল','w':'য়','x':'ও','y':'চ','z':'য',
            'A':'ৃ','B':'ণ','C':'ঐ','D':'ী','E':'ঢ','F':'অ','G':'।','H':'ভ','I':'ও','J':'্র','K':'খ','L':'থ','M':'উ','N':'ষ','O':'ঘ','P':'ঢ়','Q':'ং','R':'ফ','S':'ূ','T':'ঠ','U':'ঝ','V':'ল','W':'য়','X':'ৗ','Y':'ছ','Z':'্য',
            '1':'১','2':'২','3':'৩','4':'৪','5':'৫','6':'৬','7':'৭','8':'৮','9':'৯','0':'০',
            '‡':'ে','†':'ে','v':'া','i':'ি','`':'্য','´':'্য','I':'ও','x':'ও'
        };

        let res = "";
        for (let i = 0; i < str.length; i++) {
            let cur = str[i], nxt = str[i+1];
            // বিজয় লেআউট পজিশন শিফটিং (ে, ি, ৈ এর জন্য)
            if (['d', '‡', '†', 'c', 'C', 'i'].includes(cur) && nxt) {
                res += (map[nxt] || nxt) + (map[cur] || cur);
                i++;
            } else {
                res += map[cur] || cur;
            }
        }
        // র-য-ফলা এবং অন্যান্য যুক্তবর্ণ ফিক্স
        return res.normalize('NFC').replace(/র‌্য/g, 'র্য');
    }

    function bccFinalEngine() {
        const inputVal = document.getElementById('typing-area').value;
        const uWords = inputVal.trim().split(/\s+/);
        const pWords = targetPassage.split(/\s+/);
        
        let correctCount = 0;
        let html = "বিশ্লেষণ: <br>";

        pWords.forEach((targetWord, index) => {
            let userRaw = uWords[index] || "";
            let userConverted = bccAnsiToUni(userRaw);
            let goal = targetWord.normalize('NFC').trim();

            // আপনার সেই 'সালের' এবং 'ও' এর জন্য স্পেশাল লজিক
            if (userRaw !== "" && (userConverted === goal || userRaw === goal)) {
                html += `<span class="correct">${userRaw} </span>`;
                correctCount++;
            } else if (userRaw !== "") {
                html += `<span class="wrong">${userRaw}</span> `;
            }
        });

        // রেজাল্ট আপডেট
        const acc = ((correctCount / pWords.length) * 100).toFixed(2);
        document.getElementById('correct-words').innerText = correctCount;
        document.getElementById('accuracy').innerText = acc;
        document.getElementById('live-analysis').innerHTML = html;
    }
</script>

</body>
</html>
