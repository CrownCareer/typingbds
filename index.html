<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Crown Career | Real-time Bangla Typing</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f4f8; padding: 20px; }
        .wrapper { max-width: 900px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .box { border: 2px solid #eee; border-radius: 10px; padding: 20px; margin-bottom: 20px; font-size: 26px; line-height: 1.8; background: #fafafa; }
        textarea { width: 100%; height: 140px; font-size: 24px; padding: 15px; border: 2px solid #1a73e8; border-radius: 10px; outline: none; box-sizing: border-box; }
        .correct { color: #2ecc71; font-weight: bold; }
        .wrong { color: #e74c3c; background: #ffdada; border-radius: 4px; text-decoration: underline; font-weight: bold; }
        .active { border-bottom: 4px solid #1a73e8; background: #e8f0fe; }
        .stats { display: flex; justify-content: space-around; background: #1a73e8; color: white; padding: 15px; border-radius: 10px; margin-top: 20px; font-weight: bold; }
        .admin-section { background: #eef2f7; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="admin-section">
        <label><b>সোর্স টেক্সট (বিজয় বা ইউনিকোড পেস্ট করুন):</b></label>
        <textarea id="source-input" style="height: 60px; margin-top:10px;" placeholder="এখানে টেক্সট দিন..."></textarea>
        <button onclick="setupTest()" style="width:100%; margin-top:10px; padding:10px; cursor:pointer; background:#1a73e8; color:white; border:none; border-radius:5px; font-weight:bold;">পরীক্ষা সেট করুন</button>
    </div>

    <div id="display-area" class="box"></div>
    <label><b>বিজয় ৫২ দিয়ে টাইপ করুন (সরাসরি বাংলা হবে):</b></label>
    <textarea id="typing-input" placeholder="টাইপ শুরু করুন..."></textarea>
    
    <div class="stats">
        <div>সঠিক: <span id="correct-count">0</span></div>
        <div>ভুল: <span id="wrong-count">0</span></div>
        <div>নির্ভুলতা: <span id="accuracy">0</span>%</div>
    </div>
</div>

<script>
// বিজয় ৫২ ক্লাসিক টু ইউনিকোড পূর্ণাঙ্গ ম্যাপ
const bijoyMap = {'a':'া','i':'ি','I':'ী','u':'ু','U':'ূ','e':'ে','E':'ৈ','o':'ো','O':'ৌ','j':'ক','k':'খ','l':'গ','m':'ঘ','n':'ঙ','p':'চ','q':'ছ','r':'জ','s':'ঝ','t':'ঞ','v':'ট','w':'ঠ','x':'ড','y':'ঢ','z':'ণ','A':'ত','B':'থ','C':'দ','D':'ধ','E':'ন','G':'প','H':'ফ','I':'ব','J':'ভ','K':'ম','L':'য','M':'র','N':'ল','O':'শ','P':'ষ','Q':'স','R':'হ','S':'ড়','T':'ঢ়','U':'য়','V':'ৎ','W':'ং','X':'ঃ','Y':'ঁ','Z':'।','g':''};

function convertToUnicode(text) {
    if (!text || /[\u0980-\u09FF]/.test(text)) return text;
    let output = "";
    for (let char of text) {
        output += bijoyMap[char] || char;
    }
    // কার চিহ্ন (ে, ি, ৈ) এর পজিশন ঠিক করা
    return output.replace(/ে([ক-হ])/g, '$1ে').replace(/ি([ক-হ])/g, '$1ি').replace(/ৈ([ক-হ])/g, '$1ৈ').normalize('NFC');
}

let sourceWords = [];

function setupTest() {
    let rawSource = document.getElementById('source-input').value;
    if(!rawSource.trim()) return;
    let unicodeSource = convertToUnicode(rawSource);
    sourceWords = unicodeSource.split(/\s+/);
    document.getElementById('display-area').innerHTML = sourceWords.map(w => `<span>${w}</span>`).join(' ');
    document.getElementById('typing-input').value = "";
    updateStats(0, 0);
}

document.getElementById('typing-input').addEventListener('input', function(e) {
    let start = this.selectionStart;
    let end = this.selectionEnd;
    
    // ইংরেজি ইনপুটকে সাথে সাথে বাংলায় রূপান্তর
    let converted = convertToUnicode(this.value);
    
    if (this.value !== converted) {
        this.value = converted;
        // কার্সারের অবস্থান ঠিক রাখা
        this.setSelectionRange(start, end);
    }

    let typedWords = this.value.split(/\s+/);
    let spans = document.querySelectorAll('#display-area span');
    let correct = 0, wrong = 0;

    spans.forEach((span, i) => {
        if (!typedWords[i]) { span.className = ''; return; }
        
        let typed = typedWords[i].normalize('NFC').trim();
        let target = sourceWords[i].normalize('NFC').trim();

        if (typed === target) {
            span.className = 'correct';
            correct++;
        } else {
            span.className = 'wrong';
            wrong++;
        }
        if (i === typedWords.length - 1) span.classList.add('active');
    });
    updateStats(correct, wrong);
});

function updateStats(c, w) {
    document.getElementById('correct-count').innerText = c;
    document.getElementById('wrong-count').innerText = w;
    let total = c + w;
    document.getElementById('accuracy').innerText = total > 0 ? ((c / total) * 100).toFixed(1) : 0;
}

// ডিফল্ট উদাহরণ
document.getElementById('source-input').value = "২০১৪ ও ২০১৬ সালের পর আবারও চ্যাম্পিয়ন্স লিগ";
setupTest();
</script>

</body>
</html>
