<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>BCC Typing Test - Final Fix</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 950px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; }
        
        /* সুতন্বীএমজে ফন্ট পিসিতে ইনস্টল থাকলে এটি হুবহু BCC-র মতো দেখাবে */
        #passage-box, #typing-input, #analysis { 
            font-family: 'SutonnyMJ', 'Arial', serif; 
            font-size: 26px; line-height: 1.6; text-align: left;
        }
        
        #passage-box { background: #fff9c4; padding: 20px; border: 1px solid #fbc02d; border-radius: 8px; margin-bottom: 20px; color: #333; }
        textarea { width: 100%; height: 160px; padding: 15px; border: 2px solid #0056b3; border-radius: 8px; outline: none; box-sizing: border-box; }
        
        .stats { display: flex; justify-content: space-around; background: #202124; color: white; padding: 15px; border-radius: 8px; margin-bottom: 20px; font-weight: bold; }
        .correct { color: #28a745; }
        .wrong { color: #d93025; text-decoration: underline; font-weight: bold; }
        #analysis { margin-top: 25px; border-top: 1px dashed #ccc; padding-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color: #0056b3;">কম্পিউটার টাইপিং দক্ষতা পরীক্ষা (BCC Standard)</h2>
    
    <div class="stats">
        <div>সময় বাকি: <span id="timer">০৫:০০</span></div>
        <div>গতি (WPM): <span id="wpm">০</span></div>
        <div>নির্ভুলতা: <span id="accuracy">০.০০</span>%</div>
    </div>

    <div id="passage-box">২০১৪ ও ২০১৬ সালের পর আবারও চ্যাম্পিয়ন্স লিগ কোয়ার্টার ফাইনালে আতলেতিকো মাদ্রিদের কাছে হেরে গেল বার্সা।</div>

    <textarea id="typing-input" placeholder="বিজয় ক্লাসিক মোডে টাইপ শুরু করুন..." oninput="evaluateTyping()"></textarea>

    <div id="analysis"></div>
</div>

<script>
    const targetText = "২০১৪ ও ২০১৬ সালের পর আবারও চ্যাম্পিয়ন্স লিগ কোয়ার্টার ফাইনালে আতলেতিকো মাদ্রিদের কাছে হেরে গেল বার্সা।";
    
    // এই ইঞ্জিনটি আপনার কিবোর্ডের বিশেষ সংকেতগুলোকে (যেমন: ‡, v, i) ইউনিকোডে রূপান্তর করবে
    function bccMappingEngine(str) {
        if (!str) return "";
        const m = {
            'a':'ঋ', 'b':'ন', 'c':'এ', 'd':'ি', 'e':'ড', 'f':'া', 'g':'হ', 'h':'ব', 'i':'হ', 'j':'র', 'k':'ক', 'l':'ত', 'm':'ম', 'n':'স', 'o':'গ', 'p':'ড়', 'q':'ঙ', 'r':'প', 's':'ু', 't':'ট', 'u':'ঝ', 'v':'ল', 'w':'য়', 'x':'ও', 'y':'চ', 'z':'য',
            'A':'ৃ', 'B':'ণ', 'C':'ঐ', 'D':'ী', 'E':'ঢ', 'F':'অ', 'G':'।', 'H':'ভ', 'I':'ক্ষ', 'J':'্র', 'K':'খ', 'L':'থ', 'M':'উ', 'N':'ষ', 'O':'ঘ', 'P':'ঢ়', 'Q':'ং', 'R':'ফ', 'S':'ূ', 'T':'ঠ', 'U':'ঝ', 'V':'ল', 'W':'য়', 'X':'ৗ', 'Y':'ছ', 'Z':'্য',
            '1':'১', '2':'২', '3':'৩', '4':'৪', '5':'৫', '6':'৬', '7':'৭', '8':'৮', '9':'৯', '0':'০', '‡':'ে', '†':'ে', 'v':'া'
        };

        let res = "";
        for (let i = 0; i < str.length; i++) {
            let cur = str[i], nxt = str[i+1];
            // বিজয় ক্লাসিকের কার-চিহ্ন পজিশন শিফটিং (যেমন: '‡' বা 'd' আগে আসে)
            if (['d', '‡', '†', 'c', 'C'].includes(cur) && nxt) {
                res += (m[nxt] || nxt) + (m[cur] || cur);
                i++;
            } else {
                res += m[cur] || cur;
            }
        }
        return res.normalize('NFC').replace(/র‌্য/g, 'র্য');
    }

    function evaluateTyping() {
        const inputVal = document.getElementById('typing-input').value;
        const uWords = inputVal.trim().split(/\s+/);
        const pWords = targetText.split(/\s+/);
        
        let correctCount = 0;
        let html = "";

        pWords.forEach((pWord, i) => {
            let uRaw = uWords[i] || "";
            let uConv = bccMappingEngine(uRaw);
            let target = pWord.normalize('NFC').trim();

            // ডুয়াল চেক: যদি সরাসরি মেলে অথবা কনভার্ট করার পর মেলে
            if ((uConv === target || uRaw === target) && target !== "") {
                html += `<span class="correct">${uRaw} </span>`;
                correctCount++;
            } else if (uRaw !== "") {
                html += `<span class="wrong">${uRaw}</span> `;
            }
        });

        const acc = ((correctCount / pWords.length) * 100).toFixed(2);
        document.getElementById('accuracy').innerText = acc;
        document.getElementById('analysis').innerHTML = "টাইপিং বিশ্লেষণ: <br>" + html;
    }
</script>

</body>
</html>
