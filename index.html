<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>BCC Standard Final Simulator</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #e9ecef; padding: 20px; }
        .wrapper { max-width: 900px; margin: auto; background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        /* সুতন্বীএমজে ফন্ট লজিক */
        #passage, #typing-input, #output { 
            font-family: 'SutonnyMJ', 'SolaimanLipi', Arial; 
            font-size: 28px; line-height: 1.5; text-align: left;
        }
        
        #passage { background: #fff3cd; padding: 20px; border: 2px solid #ffeeba; border-radius: 10px; margin-bottom: 20px; color: #856404; }
        textarea { width: 100%; height: 180px; padding: 15px; border: 2px solid #007bff; border-radius: 10px; outline: none; box-sizing: border-box; transition: 0.3s; }
        textarea:focus { border-color: #0056b3; box-shadow: 0 0 10px rgba(0,91,187,0.2); }
        
        .stat-box { display: flex; justify-content: space-between; margin-bottom: 20px; background: #343a40; color: #fff; padding: 15px; border-radius: 8px; font-weight: bold; }
        .correct { color: #28a745 !important; }
        .wrong { color: #dc3545 !important; text-decoration: underline; }
        #output { margin-top: 20px; padding-top: 20px; border-top: 2px solid #dee2e6; }
    </style>
</head>
<body>

<div class="wrapper">
    <h2 style="color: #007bff; margin-bottom: 20px;">বিসিসি স্ট্যান্ডার্ড টাইপিং টেস্ট</h2>
    
    <div class="stat-box">
        <div>সঠিক শব্দ: <span id="count">০</span></div>
        <div>নির্ভুলতা: <span id="acc">০.০০</span>%</div>
    </div>

    <div id="passage">২০১৪ ও ২০১৬ সালের পর আবারও চ্যাম্পিয়ন্স লিগ কোয়ার্টার ফাইনালে আতলেতিকো মাদ্রিদের কাছে হেরে গেল বার্সা।</div>

    <textarea id="typing-input" placeholder="বিজয় ক্লাসিক (ANSI) দিয়ে টাইপ করুন..." oninput="checkTyping()"></textarea>

    <div id="output"></div>
</div>

<script>
    // প্যাসেজটিকে 'Clean' করে নেওয়া (অদৃশ্য ক্যারেক্টার রিমুভ)
    const rawPassage = "২০১৪ ও ২০১৬ সালের পর আবারও চ্যাম্পিয়ন্স লিগ কোয়ার্টার ফাইনালে আতলেতিকো মাদ্রিদের কাছে হেরে গেল বার্সা।";
    const cleanPassage = rawPassage.normalize('NFC').replace(/[\u200B-\u200D\uFEFF]/g, '');

    function bccAnsiToUni(str) {
        if (!str) return "";
        const map = {
            'a':'ঋ','b':'ন','c':'এ','d':'ি','e':'ড','f':'া','g':'হ','h':'ব','i':'হ','j':'র','k':'ক','l':'ত','m':'ম','n':'স','o':'গ','p':'ড়','q':'ঙ','r':'প','s':'ু','t':'ট','u':'ঝ','v':'ল','w':'য়','x':'ও','y':'চ','z':'য',
            'A':'ৃ','B':'ণ','C':'ঐ','D':'ী','E':'ঢ','F':'অ','G':'।','H':'ভ','I':'ও','J':'্র','K':'খ','L':'থ','M':'উ','N':'ষ','O':'ঘ','P':'ঢ়','Q':'ং','R':'ফ','S':'ূ','T':'ঠ','U':'ঝ','V':'ল','W':'য়','X':'ৗ','Y':'ছ','Z':'্য',
            '1':'১','2':'২','3':'৩','4':'৪','5':'৫','6':'৬','7':'৭','8':'৮','9':'৯','0':'০',
            '‡':'ে','†':'ে','v':'া','i':'ি','I':'ও','x':'ও'
        };

        let out = "";
        for (let i = 0; i < str.length; i++) {
            let char = str[i], next = str[i+1];
            // বিজয় কার-চিহ্ন পজিশন শিফটিং
            if (['d', '‡', '†', 'c', 'C', 'i'].includes(char) && next) {
                out += (map[next] || next) + (map[char] || char);
                i++;
            } else {
                out += map[char] || char;
            }
        }
        return out.normalize('NFC').replace(/র‌্য/g, 'র্য');
    }

    function checkTyping() {
        const input = document.getElementById('typing-input').value;
        const words = input.trim().split(/\s+/);
        const targetWords = cleanPassage.split(/\s+/);
        
        let correct = 0;
        let resultHtml = "";

        targetWords.forEach((target, i) => {
            let userRaw = words[i] || "";
            let userUni = bccAnsiToUni(userRaw);
            let targetClean = target.normalize('NFC').trim();

            if (userRaw !== "" && (userUni === targetClean || userRaw === targetClean)) {
                resultHtml += `<span class="correct">${userRaw} </span>`;
                correct++;
            } else if (userRaw !== "") {
                resultHtml += `<span class="wrong">${userRaw}</span> `;
            }
        });

        document.getElementById('count').innerText = correct;
        document.getElementById('acc').innerText = ((correct / targetWords.length) * 100).toFixed(2);
        document.getElementById('output').innerHTML = resultHtml;
    }
</script>

</body>
</html>
