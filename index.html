<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>BCC Final Typing Fix</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        
        /* সুতন্বীএমজে ফন্ট পিসিতে ইনস্টল থাকলে এটি হুবহু BCC-র মতো দেখাবে */
        #passage-box, #typing-area, #analysis { 
            font-family: 'SutonnyMJ', 'Arial', serif; 
            font-size: 26px; line-height: 1.6; text-align: left;
        }
        
        #passage-box { background: #fff9c4; padding: 20px; border: 1px solid #fbc02d; border-radius: 8px; margin-bottom: 20px; }
        textarea { width: 100%; height: 160px; padding: 15px; border: 2px solid #0056b3; border-radius: 8px; outline: none; box-sizing: border-box; }
        
        .correct { color: #28a745; font-weight: bold; }
        .wrong { color: #d93025; text-decoration: underline; font-weight: bold; }
        .stats { font-size: 22px; font-weight: bold; margin-top: 20px; color: #333; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color: #0056b3;">কম্পিউটার টাইপিং দক্ষতা পরীক্ষা (BCC Standard)</h2>
    
    <div id="passage-box">২০১৪ ও ২০১৬ সালের পর আবারও চ্যাম্পিয়ন্স লিগ কোয়ার্টার ফাইনালে আতলেতিকো মাদ্রিদের কাছে হেরে গেল বার্সা।</div>

    <textarea id="typing-area" placeholder="বিজয় ক্লাসিক মোডে টাইপ শুরু করুন..." oninput="checkResult()"></textarea>

    <div id="analysis" style="margin-top: 25px;"></div>
    <div id="stats" class="stats"></div>
</div>

<script>
    const passageText = "২০১৪ ও ২০১৬ সালের পর আবারও চ্যাম্পিয়ন্স লিগ কোয়ার্টার ফাইনালে আতলেতিকো মাদ্রিদের কাছে হেরে গেল বার্সা।";

    // এই ফাংশনটি বিজয় ক্লাসিকের অদৃশ্য এনকোডিং (যেমন: ‡, v, i) ঠিক করবে
    function bccNormalizer(str) {
        if (!str) return "";
        const mapping = {
            'a':'ঋ','b':'ন','c':'এ','d':'ি','e':'ড','f':'া','g':'হ','h':'ব','i':'হ','j':'র','k':'ক','l':'ত','m':'ম','n':'স','o':'গ','p':'ড়','q':'ঙ','r':'প','s':'ু','t':'ট','u':'ঝ','v':'ল','w':'য়','x':'ও','y':'চ','z':'য',
            'A':'ৃ','B':'ণ','C':'ঐ','D':'ী','E':'ঢ','F':'অ','G':'।','H':'ভ','I':'ক্ষ','J':'্র','K':'খ','L':'থ','M':'উ','N':'ষ','O':'ঘ','P':'ঢ়','Q':'ং','R':'ফ','S':'ূ','T':'ঠ','U':'ঝ','V':'ল','W':'য়','X':'ৗ','Y':'ছ','Z':'্য',
            '1':'১','2':'২','3':'৩','4':'৪','5':'৫','6':'৬','7':'৭','8':'৮','9':'৯','0':'০','‡':'ে','†':'ে','v':'া'
        };

        let result = "";
        for (let i = 0; i < str.length; i++) {
            let char = str[i], next = str[i+1];
            // কার-চিহ্ন পজিশন শিফটিং (d, ‡, † লজিক)
            if (['d', '‡', '†', 'c', 'C'].includes(char) && next) {
                result += (mapping[next] || next) + (mapping[char] || char);
                i++;
            } else {
                result += mapping[char] || char;
            }
        }
        return result.normalize('NFC').replace(/র‌্য/g, 'র্য');
    }

    function checkResult() {
        const input = document.getElementById('typing-area').value;
        const uWords = input.trim().split(/\s+/);
        const pWords = passageText.split(/\s+/);
        
        let correctWords = 0;
        let htmlOutput = "";

        pWords.forEach((word, index) => {
            let uRaw = uWords[index] || "";
            let uConverted = bccNormalizer(uRaw);
            let target = word.normalize('NFC').trim();

            // ডুয়াল কম্পারিজন লজিক
            if ((uConverted === target || uRaw === target) && target !== "") {
                htmlOutput += `<span class="correct">${uRaw} </span>`;
                correctWords++;
            } else if (uRaw !== "") {
                htmlOutput += `<span class="wrong">${uRaw}</span> `;
            }
        });

        const accuracy = ((correctWords / pWords.length) * 100).toFixed(2);
        document.getElementById('analysis').innerHTML = "টাইপিং বিশ্লেষণ: <br>" + htmlOutput;
        document.getElementById('stats').innerText = `নির্ভুলতা: ${accuracy}% | সঠিক শব্দ: ${correctWords}`;
    }
</script>

</body>
</html>
