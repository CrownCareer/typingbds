<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>BCC Style Typing Fix - Full</title>
    <style>
        :root { --blue: #0056b3; --green: #28a745; --red: #dc3545; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f7f6; padding: 20px; }
        .box { background: #fff; padding: 25px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        
        /* সুতন্বীএমজে ফন্ট পিসিতে ইনস্টল থাকা অবস্থায় টাইপ করতে হবে */
        #p-text, #t-input, #user-compare-text { 
            font-family: 'SutonnyMJ', 'Arial', sans-serif; 
            font-size: 26px; line-height: 1.8;
        }
        textarea { width: 100%; height: 130px; border: 2px solid var(--blue); border-radius: 8px; padding: 15px; outline: none; }
        .correct { color: black; }
        .wrong { color: var(--red); text-decoration: underline; font-weight: bold; }
        .btn { background: var(--green); color: white; padding: 12px 50px; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="box">
    <div id="p-text">২০১৪ ও ২০১৬ সালের পর আবারও চ্যাম্পিয়ন্স লিগ কোয়ার্টার ফাইনালে আতলেতিকো মাদ্রিদের কাছে হেরে গেল বার্সা।</div>
</div>

<div class="box">
    <textarea id="t-input" placeholder="বিজয় ক্লাসিক (Ctrl+Alt+B) দিয়ে টাইপ করুন..."></textarea>
</div>

<center><button class="btn" onclick="showResult()">ফলাফল দেখুন</button></center>

<div id="res-box" class="box" style="display:none; margin-top:20px;">
    <h3>বিশ্লেষণ:</h3>
    <div id="user-compare-text"></div>
</div>

<script>
    const passage = "২০১৪ ও ২০১৬ সালের পর আবারও চ্যাম্পিয়ন্স লিগ কোয়ার্টার ফাইনালে আতলেতিকো মাদ্রিদের কাছে হেরে গেল বার্সা।";

    // এই ফাংশনটি বিজয়ের জটিল যুক্তবর্ণ ও কার-চিহ্ন হ্যান্ডেল করবে
    function bccNormalizer(str) {
        if (!str) return "";
        const map = {
            'a':'ঋ', 'b':'ন', 'c':'এ', 'd':'ি', 'e':'ড', 'f':'া', 'g':'হ', 'h':'ব', 'i':'হ', 'j':'র', 'k':'ক', 'l':'ত', 'm':'ম', 'n':'স', 'o':'গ', 'p':'ড়', 'q':'ঙ', 'r':'প', 's':'ু', 't':'ট', 'u':'ঝ', 'v':'ল', 'w':'য়', 'x':'ও', 'y':'চ', 'z':'য',
            'A':'ৃ', 'B':'ণ', 'C':'ঐ', 'D':'ী', 'E':'ঢ', 'F':'অ', 'G':'।', 'H':'ভ', 'I':'ক্ষ', 'J':'্র', 'K':'খ', 'L':'থ', 'M':'উ', 'N':'ষ', 'O':'ঘ', 'P':'ঢ়', 'Q':'ং', 'R':'ফ', 'S':'ূ', 'T':'ঠ', 'U':'ঝ', 'V':'ল', 'W':'য়', 'X':'ৗ', 'Y':'ছ', 'Z':'্য',
            '1':'১', '2':'২', '3':'৩', '4':'৪', '5':'৫', '6':'৬', '7':'৭', '8':'৮', '9':'৯', '0':'০', '&':'ষ'
        };

        let result = "";
        for (let i = 0; i < str.length; i++) {
            let cur = str[i], nxt = str[i+1];
            // ই-কার (d), এ-কার (c) এর অবস্থান পরিবর্তন লজিক
            if (['d', 'c', 'C'].includes(cur) && nxt) {
                result += (map[nxt] || nxt) + (map[cur] || cur);
                i++;
            } else {
                result += map[cur] || cur;
            }
        }
        // Unicode Normalization (BCC Standard)
        return result.normalize('NFC').replace(/র‌্য/g, 'র্য').trim();
    }

    function showResult() {
        const userInput = document.getElementById('t-input').value;
        const iWords = userInput.trim().split(/\s+/);
        const pWords = passage.trim().split(/\s+/);
        
        let comparisonHTML = "";
        let correctCount = 0;

        pWords.forEach((word, idx) => {
            const userRaw = iWords[idx] || "";
            const converted = bccNormalizer(userRaw);
            const target = word.normalize('NFC').trim();

            if (converted === target && target !== "") {
                comparisonHTML += `<span class="correct">${userRaw} </span>`;
                correctCount++;
            } else if (userRaw !== "") {
                comparisonHTML += `<span class="wrong">${userRaw}</span> `;
            }
        });

        document.getElementById('user-compare-text').innerHTML = comparisonHTML;
        document.getElementById('res-box').style.display = "block";
        alert("নির্ভুলতা (Accuracy): " + ((correctCount / pWords.length) * 100).toFixed(2) + "%");
    }
</script>
</body>
</html>
