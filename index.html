<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Crown Career | Final Professional Fix</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f7f6; padding: 20px; display: flex; justify-content: center; }
        .wrapper { max-width: 900px; width: 100%; background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #1a73e8; }
        .admin-panel { margin-bottom: 20px; padding: 15px; background: #eef2f7; border-radius: 10px; display: flex; flex-direction: column; gap: 10px; }
        #new-source-text { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; min-height: 60px; }
        #set-text-btn { padding: 10px 20px; background: #1a73e8; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .box { border: 2px solid #eee; border-radius: 10px; padding: 20px; margin-bottom: 20px; min-height: 80px; font-size: 24px; line-height: 1.8; background: #fafafa; word-wrap: break-word; }
        textarea { width: 100%; height: 120px; font-size: 22px; padding: 15px; border: 2px solid #1a73e8; border-radius: 10px; outline: none; resize: none; box-sizing: border-box; }
        .correct { color: #2ecc71; }
        .wrong { color: #e74c3c; text-decoration: underline; background-color: rgba(231, 76, 60, 0.1); }
        .active { background-color: #fff3cd; border-bottom: 3px solid #1a73e8; }
        .stats { display: flex; justify-content: space-around; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="wrapper">
    <h1>Crown Career বিজয় টাইপিং মাস্টার</h1>

    <div class="admin-panel">
        <textarea id="new-source-text" placeholder="অনলাইন থেকে টেক্সট কপি করে এখানে পেস্ট করুন..."></textarea>
        <button id="set-text-btn">টেক্সট সেট করুন</button>
    </div>

    <div id="display-area" class="box"></div>
    <textarea id="typing-input" spellcheck="false" placeholder="বিজয় ৫২ (Classic) মোডে টাইপ করুন..."></textarea>
    
    <div class="stats">
        <div>সঠিক: <span id="correct-count">0</span></div>
        <div>ভুল: <span id="wrong-count">0</span></div>
        <div>Accuracy: <span id="accuracy">0</span>%</div>
    </div>
</div>

<script>
/**
 * ১. স্ট্রিক্ট নরমালাইজার: 
 * এটি অনলাইন থেকে কপি করা 'ো' এবং কিবোর্ডের 'ো' কে একই কোডে রূপান্তর করে।
 */
function normalizeForComparison(text) {
    if (!text) return "";
    return text.normalize('NFC').trim();
}

let sourceWords = [];
const displayArea = document.getElementById('display-area');
const inputArea = document.getElementById('typing-input');
const newTextInp = document.getElementById('new-source-text');

function init(text) {
    // সোর্স টেক্সট নরমালাইজ করে শব্দে ভাগ করা
    let cleanText = normalizeForComparison(text);
    sourceWords = cleanText.split(/\s+/).filter(w => w.length > 0);
    displayArea.innerHTML = sourceWords.map(word => `<span>${word}</span>`).join(' ');
    inputArea.value = ""; 
    updateStats(0, 0);
}

document.getElementById('set-text-btn').addEventListener('click', () => {
    if(newTextInp.value.trim() !== "") {
        init(newTextInp.value);
        newTextInp.value = "";
    }
});

inputArea.addEventListener('input', () => {
    // টাইপ করা টেক্সট নরমালাইজ করা
    let typedText = normalizeForComparison(inputArea.value);
    let typedWords = typedText.split(/\s+/).filter(w => w.length > 0);

    let correct = 0;
    let wrong = 0;
    let spans = displayArea.querySelectorAll('span');

    spans.forEach((span, i) => {
        let target = sourceWords[i];
        let typed = typedWords[i];

        if (!typed) {
            span.className = '';
        } else if (typed === target) {
            span.className = 'correct';
            correct++;
        } else {
            span.className = 'wrong';
            wrong++;
        }

        // কারসার পজিশন হাইলাইট
        if (i === typedWords.length - (inputArea.value.endsWith(' ') ? 0 : 1)) {
            span.classList.add('active');
        }
    });

    updateStats(correct, wrong);
});

function updateStats(c, w) {
    document.getElementById('correct-count').innerText = c;
    document.getElementById('wrong-count').innerText = w;
    let total = c + w;
    document.getElementById('accuracy').innerText = total > 0 ? ((c / total) * 100).toFixed(1) : 0;
}

init("আমাদের সোনার বাংলা আমি তোমায় ভালোবাসি");
</script>

</body>
</html>
