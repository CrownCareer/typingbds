<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Crown Career - BCC Typing Solution</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f8f9fa; padding: 20px; }
        .box { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        
        #text-box, #user-input, #live-view { 
            font-family: 'SutonnyMJ', Arial, serif; 
            font-size: 26px; line-height: 1.6; text-align: left;
        }
        
        #text-box { background: #fffde7; padding: 20px; border: 1px solid #ffd54f; border-radius: 8px; margin-bottom: 20px; }
        textarea { width: 100%; height: 180px; padding: 15px; border: 2px solid #007bff; border-radius: 8px; outline: none; box-sizing: border-box; }
        
        .correct { color: #28a745 !important; font-weight: bold; }
        .wrong { color: #dc3545 !important; text-decoration: underline; font-weight: bold; }
        #live-view { margin-top: 20px; padding-top: 20px; border-top: 2px dashed #ccc; }
    </style>
</head>
<body>

<div class="box">
    <h2 style="color: #007bff; text-align: center;">বিসিসি স্ট্যান্ডার্ড টাইপিং সিমুলেটর</h2>
    
    <div id="text-box">২০১৪ ও ২০১৬ সালের পর আবারও চ্যাম্পিয়ন্স লিগ কোয়ার্টার ফাইনালে আতলেতিকো মাদ্রিদের কাছে হেরে গেল বার্সা।</div>

    <textarea id="user-input" placeholder="বিজয় ক্লাসিক মোডে টাইপ করুন..." oninput="solveBCC()"></textarea>

    <div id="live-view">বিশ্লেষণ এখানে দেখাবে...</div>
</div>

<script>
    const target = "২০১৪ ও ২০১৬ সালের পর আবারও চ্যাম্পিয়ন্স লিগ কোয়ার্টার ফাইনালে আতলেতিকো মাদ্রিদের কাছে হেরে গেল বার্সা।";

    // এই ফাংশনটি আপনার টাইপ করা ANSI ক্যারেক্টারকে ইউনিকোডে রূপান্তর করবে
    function decodeBCC(str) {
        if (!str) return "";
        const map = {
            'a':'ঋ','b':'ন','c':'এ','d':'ি','e':'ড','f':'া','g':'হ','h':'ব','i':'হ','j':'র','k':'ক','l':'ত','m':'ম','n':'স','o':'গ','p':'ড়','q':'ঙ','r':'প','s':'ু','t':'ট','u':'ঝ','v':'ল','w':'য়','x':'ও','y':'চ','z':'য',
            'A':'ৃ','B':'ণ','C':'ঐ','D':'ী','E':'ঢ','F':'অ','G':'।','H':'ভ','I':'ও','J':'্র','K':'খ','L':'থ','M':'উ','N':'ষ','O':'ঘ','P':'ঢ়','Q':'ং','R':'ফ','S':'ূ','T':'ঠ','U':'ঝ','V':'ল','W':'য়','X':'ৗ','Y':'ছ','Z':'্য',
            '1':'১','2':'২','3':'৩','4':'৪','5':'৫','6':'৬','7':'৭','8':'৮','9':'৯','0':'০',
            '‡':'ে','†':'ে','v':'া','i':'ি','I':'ও','x':'ও'
        };

        let res = "";
        for (let i = 0; i < str.length; i++) {
            let char = str[i], next = str[i+1];
            // কার-চিহ্ন আগে থাকলে সেটিকে বর্ণের পরে নিয়ে আসা (বিজয় ক্লাসিকের জন্য)
            if (['d', '‡', '†', 'c', 'C', 'i'].includes(char) && next) {
                res += (map[next] || next) + (map[char] || char);
                i++;
            } else {
                res += map[char] || char;
            }
        }
        return res.normalize('NFC').replace(/র‌্য/g, 'র্য');
    }

    function solveBCC() {
        const input = document.getElementById('user-input').value;
        const uWords = input.trim().split(/\s+/);
        const tWords = target.split(/\s+/);
        
        let html = "";
        tWords.forEach((word, index) => {
            let raw = uWords[index] || "";
            let converted = decodeBCC(raw);
            let goal = word.normalize('NFC').trim();

            if (raw !== "" && (converted === goal || raw === goal)) {
                html += `<span class="correct">${raw} </span>`;
            } else if (raw !== "") {
                html += `<span class="wrong">${raw}</span> `;
            }
        });
        document.getElementById('live-view').innerHTML = html;
    }
</script>

</body>
</html>
