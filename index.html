<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Official Typing Exam - Bijoy Fix</title>
    <style>
        :root { --blue: #0056b3; --green: #28a745; --red: #dc3545; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); padding: 20px; }
        .box { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 10px; }
        .hidden { display: none !important; }
        
        /* ফন্ট সেটিংস: SutonnyMJ কিবোর্ড লেআউটের জন্য জরুরি */
        #passage-stable, #t-input, #user-compare-text { 
            font-family: 'SutonnyMJ', 'Arial Unicode MS', sans-serif; 
        }

        #passage-stable { font-size: 26px; line-height: 1.8; text-align: justify; margin-bottom: 20px; }
        textarea { width: 100%; height: 120px; font-size: 24px; border: 2px solid var(--blue); border-radius: 8px; padding: 10px; outline: none; }
        .error-highlight { color: var(--red); text-decoration: underline; font-weight: bold; }
        .btn-main { background: var(--blue); color: white; padding: 12px 40px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="page-exam">
    <div class="box" style="display: flex; justify-content: space-between;">
        <div>👤 পরীক্ষার্থী: <b>Emrul Kayes</b></div>
        <div style="color: var(--red); font-weight: bold;">সময় চলছে...</div>
    </div>
    <div id="passage-stable" class="box">
        ২০১৪ ও ২০১৬ সালের পর আবারও চ্যাম্পিয়ন্স লিগ কোয়ার্টার ফাইনালে আতলেতিকো মাদ্রিদের কাছে হেরে গেল বার্সা।
    </div>
    <div class="box">
        <textarea id="t-input" placeholder="বিজয় ক্লাসিক মোডে টাইপ করুন..." oninput="startCount()"></textarea>
    </div>
    <div style="text-align: right;">
        <button class="btn-main" style="background: var(--green);" onclick="finishExam()">Go to Finish</button>
    </div>
</div>

<div id="page-result" class="box hidden">
    <h2 style="color: var(--blue);">টাইপিং ফলাফল</h2>
    <div id="res-stats" style="font-size: 18px; margin-bottom: 15px;"></div>
    <div id="user-compare-text" style="line-height: 1.8; font-size: 24px; padding: 15px; background: #f9f9f9; border-radius: 5px;"></div>
    <button class="btn-main" style="margin-top: 20px;" onclick="location.reload()">আবার চেষ্টা করুন</button>
</div>

<script>
    let passage = "২০১৪ ও ২০১৬ সালের পর আবারও চ্যাম্পিয়ন্স লিগ কোয়ার্টার ফাইনালে আতলেতিকো মাদ্রিদের কাছে হেরে গেল বার্সা।";
    
    // ১. বিজয় ক্লাসিকের স্পেশাল ক্যারেক্টার হ্যান্ডলিং ইঞ্জিন
    function bijoyToUnicode(str) {
        if (!str) return "";
        const map = {
            'a':'ঋ', 'b':'ন', 'c':'এ', 'd':'ি', 'e':'ড', 'f':'া', 'g':'হ', 'h':'ব', 'i':'হ', 'j':'র', 'k':'ক', 'l':'ত', 'm':'ম', 'n':'স', 'o':'গ', 'p':'ড়', 'q':'ঙ', 'r':'প', 's':'ু', 't':'ট', 'u':'ঝ', 'v':'ল', 'w':'য়', 'x':'ও', 'y':'চ', 'z':'য',
            'A':'ৃ', 'B':'ণ', 'C':'ঐ', 'D':'ী', 'E':'ঢ', 'F':'অ', 'G':'।', 'H':'ভ', 'I':'ক্ষ', 'J':'্র', 'K':'খ', 'L':'থ', 'M':'উ', 'N':'ষ', 'O':'ঘ', 'P':'ঢ়', 'Q':'ং', 'R':'ফ', 'S':'ূ', 'T':'ঠ', 'U':'ঝ', 'V':'ল', 'W':'য়', 'X':'ৗ', 'Y':'ছ', 'Z':'্য',
            '1':'১', '2':'২', '3':'৩', '4':'৪', '5':'৫', '6':'৬', '7':'৭', '8':'৮', '9':'৯', '0':'০'
        };

        let res = "";
        for (let i = 0; i < str.length; i++) {
            let cur = str[i], nxt = str[i+1];
            // কার-চিহ্ন পজিশন ফিক্সিং লজিক
            if (['d', 'c', 'C'].includes(cur) && nxt) {
                res += (map[nxt] || nxt) + (map[cur] || cur);
                i++;
            } else {
                res += map[cur] || cur;
            }
        }
        return res.normalize('NFC').trim();
    }

    function startCount() { /* টাইমার লজিক */ }

    function finishExam() {
        const rawInput = document.getElementById('t-input').value;
        const iWords = rawInput.trim().split(/\s+/);
        const pWords = passage.trim().split(/\s+/);

        let correctCount = 0, comparisonHTML = "";

        pWords.forEach((word, idx) => {
            const userWordRaw = iWords[idx] || "";
            const convUser = bijoyToUnicode(userWordRaw);
            const normPass = word.normalize('NFC').trim();

            if (convUser === normPass && normPass !== "") {
                comparisonHTML += `<span style="color:black">${userWordRaw} </span>`;
                correctCount++;
            } else if (userWordRaw !== "") {
                comparisonHTML += `<span class="error-highlight">${userRawWord || userWordRaw}</span> `;
            }
        });

        document.getElementById('res-stats').innerHTML = `সঠিক শব্দ: ${correctCount} / ${pWords.length}`;
        document.getElementById('user-compare-text').innerHTML = comparisonHTML;
        document.getElementById('page-exam').classList.add('hidden');
        document.getElementById('page-result').classList.remove('hidden');
    }
</script>
</body>
</html>
