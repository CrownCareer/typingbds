<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Crown Career | Bijoy to Unicode Fix</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f7f6; padding: 20px; }
        .wrapper { max-width: 900px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .box { border: 2px solid #eee; border-radius: 10px; padding: 20px; margin-bottom: 20px; font-size: 24px; line-height: 1.8; background: #fafafa; }
        textarea { width: 100%; height: 120px; font-size: 22px; padding: 15px; border: 2px solid #1a73e8; border-radius: 10px; outline: none; box-sizing: border-box; }
        /* বিজয় ৫২ টাইপ করার সময় স্ক্রিনে যাতে আপনি ফন্টটি সুতন্বী এর মতো দেখতে পান */
        #typing-input { font-family: 'SutonnyMJ', 'Segoe UI', sans-serif; }
        .correct { color: #2ecc71; }
        .wrong { color: #e74c3c; background: #ffdada; border-radius: 4px; text-decoration: underline; }
        .active { border-bottom: 4px solid #1a73e8; background: #e8f0fe; }
        .stats { display: flex; justify-content: space-around; background: #1a73e8; color: white; padding: 15px; border-radius: 10px; margin-top: 20px; }
        .admin-panel { margin-bottom: 20px; padding: 15px; background: #eef2f7; border-radius: 10px; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="admin-panel">
        <label><b>পরীক্ষার টেক্সট এখানে দিন:</b></label>
        <textarea id="source-input" style="height: 60px; margin-top: 10px;" placeholder="টেক্সট পেস্ট করুন (ইউনিকোড বা বিজয়)..."></textarea>
        <button id="set-btn" style="margin-top:10px; padding:10px 20px; cursor:pointer; background:#1a73e8; color:white; border:none; border-radius:5px;">সেট করুন</button>
    </div>

    <div id="display-area" class="box"></div>
    <p><b>বিজয় ৫২ কিবোর্ড দিয়ে নিচে টাইপ করুন:</b></p>
    <textarea id="typing-input" placeholder="টাইপিং শুরু করুন..."></textarea>
    
    <div class="stats">
        <div>সঠিক: <span id="correct-count">0</span></div>
        <div>ভুল: <span id="wrong-count">0</span></div>
        <div>নির্ভুলতা: <span id="accuracy">0</span>%</div>
    </div>
</div>

<script>
// বিজয় ৫২ ক্লাসিক টু ইউনিকোড ম্যাপ (ASCII Based)
const bijoyToUniMap = {
    'a':'া', 'i':'ি', 'I':'ী', 'u':'ু', 'U':'ূ', 'e':'ে', 'E':'ৈ', 'o':'ো', 'O':'ৌ',
    'j':'ক', 'k':'খ', 'l':'গ', 'm':'ঘ', 'n':'ঙ', 'p':'চ', 'q':'ছ', 'r':'জ', 's':'ঝ', 't':'ঞ',
    'v':'ট', 'w':'ঠ', 'x':'ড', 'y':'ঢ', 'z':'ণ', 'A':'ত', 'B':'থ', 'C':'দ', 'D':'ধ', 'E':'ন',
    'G':'প', 'H':'ফ', 'I':'ব', 'J':'ভ', 'K':'ম', 'L':'য', 'M':'র', 'N':'ল', 'O':'শ', 'P':'ষ', 'Q':'স', 'R':'হ',
    'S':'ড়', 'T':'ঢ়', 'U':'য়', 'V':'ৎ', 'W':'ং', 'X':'ঃ', 'Y':'ঁ', 'Z':'।', 'g':'', '&':'ষ',
    '0':'০', '1':'১', '2':'২', '3':'৩', '4':'৪', '5':'৫', '6':'৬', '7':'৭', '8':'৮', '9':'৯'
};

// কনভার্টার ইঞ্জিন
function smartConvert(text) {
    if (!text) return "";
    // যদি অলরেডি বাংলা বর্ণ থাকে তবে কনভার্ট করবে না
    if (/[\u0980-\u09FF]/.test(text)) return text.normalize('NFC').trim();

    let converted = "";
    for (let char of text) {
        converted += bijoyToUniMap[char] || char;
    }
    // বিজয় কার চিহ্ন পজিশন ঠিক করা
    return converted.replace(/ে([ক-হ])/g, '$1ে')
                    .replace(/ি([ক-হ])/g, '$1ি')
                    .replace(/ৈ([ক-হ])/g, '$1ৈ')
                    .normalize('NFC').trim();
}

let sourceWords = [];
const displayArea = document.getElementById('display-area');
const typingInput = document.getElementById('typing-input');

function init(text) {
    let cleanText = smartConvert(text);
    sourceWords = cleanText.split(/\s+/);
    displayArea.innerHTML = sourceWords.map(w => `<span>${w}</span>`).join(' ');
    typingInput.value = "";
    updateStats(0, 0);
}

document.getElementById('set-btn').addEventListener('click', () => {
    init(document.getElementById('source-input').value);
});

typingInput.addEventListener('input', function() {
    let typedRaw = this.value.split(/\s+/);
    let spans = displayArea.querySelectorAll('span');
    let correct = 0;
    let wrong = 0;

    spans.forEach((span, i) => {
        if (!typedRaw[i]) {
            span.className = '';
            return;
        }

        // আপনার টাইপ করা ইংরেজি অক্ষরগুলোকে বাংলায় কনভার্ট করে চেক করা হচ্ছে
        let typedConverted = smartConvert(typedRaw[i]);
        let target = sourceWords[i];

        if (typedConverted === target) {
            span.className = 'correct';
            correct++;
        } else {
            span.className = 'wrong';
            wrong++;
        }
        if (i === typedRaw.length - 1) span.classList.add('active');
    });

    updateStats(correct, wrong);
});

function updateStats(c, w) {
    document.getElementById('correct-count').innerText = c;
    document.getElementById('wrong-count').innerText = w;
    let total = c + w;
    document.getElementById('accuracy').innerText = total > 0 ? ((c / total) * 100).toFixed(1) : 0;
}

// ডিফল্ট টেক্সট
init("আমাদের সোনার বাংলা আমি তোমায় ভালোবাসি");
</script>

</body>
</html>
