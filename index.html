<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Crown Career | Bijoy Typing Master Final Fix</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f7f6; padding: 20px; display: flex; justify-content: center; }
        .wrapper { max-width: 900px; width: 100%; background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #1a73e8; }
        .box { border: 2px solid #eee; border-radius: 10px; padding: 20px; margin-bottom: 20px; min-height: 80px; font-size: 24px; line-height: 1.8; background: #fafafa; }
        textarea { width: 100%; height: 120px; font-size: 22px; padding: 15px; border: 2px solid #1a73e8; border-radius: 10px; outline: none; resize: none; box-sizing: border-box; font-family: 'SutonnyMJ', serif; }
        .correct { color: #2ecc71; }
        .wrong { color: #e74c3c; text-decoration: underline; }
        .active { background-color: #fff3cd; border-bottom: 3px solid #1a73e8; }
        .stats { display: flex; justify-content: space-around; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="wrapper">
    <h1>বিজয় টাইপিং মাস্টার - ও-কার সমাধান</h1>
    <div id="display-area" class="box"></div>
    <textarea id="typing-input" placeholder="বিজয় ৫২ (Classic) মোডে টাইপ করুন..."></textarea>
    <div class="stats">
        <div>সঠিক: <span id="correct-count">0</span></div>
        <div>ভুল: <span id="wrong-count">0</span></div>
        <div>Accuracy: <span id="accuracy">0</span>%</div>
    </div>
</div>

<script>
/**
 * ১. ও-কার এবং অন্যান্য কার চিহ্নের জন্য উন্নত ম্যাপিং
 * এখানে ‡ (Alt+0135) এবং † (Alt+0134) উভয় ও-কার চিহ্নকে অন্তর্ভুক্ত করা হয়েছে।
 */
const bijoyMasterMap = {
    'Avgv‡`i': 'আমাদের',
    '‡mvbvi': 'সোনার',   
    '†mvbvi': 'সোনার',   
    'evsjv': 'বাংলা',
    'Avwg': 'আমি',
    '†Zvgvq': 'তোমায়',   
    '‡Zvgvq': 'তোমায়',   
    'fv‡ivevwm': 'ভালোবাসি', 
    'fv‡jvevwm': 'ভালোবাসি',
    'wPiw`b': 'চিরদিন',
    '†Zvgvi': 'তোমার',
    '‡Zvgvi': 'তোমার',
    'AvKvk': 'আকাশ'
};

function advancedConverter(ansiText) {
    if (!ansiText) return "";
    
    // বিজয়ের স্পেশাল ক্যারেক্টার ও স্পেস ক্লিন করা
    let words = ansiText.split(/\s+/);
    
    return words.map(w => {
        let cleanWord = w.trim();
        // যদি ম্যাপে সরাসরি শব্দ পাওয়া যায়
        if (bijoyMasterMap[cleanWord]) return bijoyMasterMap[cleanWord];
        
        // যদি ম্যাপে না পাওয়া যায়, তবে এটি ইউনিকোড ইনপুট কিনা চেক করবে
        return cleanWord;
    }).join(' ');
}

const originalText = "আমাদের সোনার বাংলা আমি তোমায় ভালোবাসি";
// মূল টেক্সটকে নরমালাইজ করা (যাতে ও-কার ভেঙ্গে না যায়)
const sourceWords = originalText.normalize('NFC').split(' ');

const displayArea = document.getElementById('display-area');
const inputArea = document.getElementById('typing-input');

function init() {
    displayArea.innerHTML = sourceWords.map(word => `<span>${word}</span>`).join(' ');
}
init();

inputArea.addEventListener('input', () => {
    let rawInput = inputArea.value;
    let convertedInput = advancedConverter(rawInput);
    
    // ২. সবচেয়ে গুরুত্বপূর্ণ অংশ: NFC Normalization
    // এটি 'ে' + 'া' কে একত্রে 'ো' হিসেবে রূপান্তর করে
    convertedInput = convertedInput.normalize('NFC');
    let typedWords = convertedInput.trim().split(/\s+/);

    let correct = 0;
    let wrong = 0;
    let spans = displayArea.querySelectorAll('span');

    spans.forEach((span, i) => {
        let target = sourceWords[i].normalize('NFC');
        let typed = typedWords[i] ? typedWords[i].normalize('NFC') : null;

        if (typed === null) {
            span.className = '';
        } else if (typed === target) {
            span.className = 'correct';
            correct++;
        } else {
            span.className = 'wrong';
            wrong++;
        }

        if (i === typedWords.length - 1 && typed) {
            span.classList.add('active');
        }
    });

    document.getElementById('correct-count').innerText = correct;
    document.getElementById('wrong-count').innerText = wrong;
    let total = correct + wrong;
    document.getElementById('accuracy').innerText = total > 0 ? ((correct / total) * 100).toFixed(1) : 0;
});
</script>

</body>
</html>
