<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Official Bijoy 52 Typing System</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        :root { --blue: #0056b3; --green: #28a745; --red: #dc3545; --bg: #f4f7f6; --teal: #17a2b8; }
        html, body { height: 100%; margin: 0; font-family: 'Arial', sans-serif; background: var(--bg); overflow-x: hidden; }
        
        /* বিজয় ফন্ট সাপোর্ট - অবশ্যই পিসিতে SutonnyMJ থাকতে হবে */
        .bijoy-font { font-family: 'SutonnyMJ', 'Sutonny MJ', sans-serif !important; }
        
        .container { display: flex; flex-direction: column; min-height: 100vh; padding: 20px; box-sizing: border-box; }
        .box { background: #fff; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); padding: 20px; margin-bottom: 10px; }
        .hidden { display: none !important; }
        
        .auth-card { max-width: 400px; margin: 50px auto; text-align: center; border-top: 5px solid var(--blue); }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .btn-main { background: var(--blue); color: white; padding: 12px; border: none; border-radius: 5px; width: 100%; cursor: pointer; font-weight: bold; }
        
        .result-header { color: #004085; text-align: center; font-size: 24px; margin-bottom: 20px; font-weight: bold; border-bottom: 2px solid #eee; padding-bottom: 10px;}
        .result-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; }
        .card { padding: 12px; border: 1px solid #ddd; background: #fff; border-radius: 8px; font-size: 14px; }
        .card h4 { margin: -12px -12px 10px -12px; padding: 10px; font-size: 15px; border-radius: 8px 8px 0 0; border-bottom: 1px solid #eee; }
        .c-green h4 { color: #28a745; background: #f8fff9; }
        .c-orange h4 { color: #d35400; background: #fffaf0; }
        .c-red h4 { color: #dc3545; background: #fff5f5; }
        .card p { margin: 10px 0; display: flex; justify-content: space-between; border-bottom: 1px dashed #eee; padding-bottom: 5px;}
        
        #passage-stable { font-size: 30px; line-height: 1.6; height: 280px; overflow-y: auto; text-align: justify; user-select: none; margin-bottom: 20px; }
        .input-box { border: 2px solid var(--blue); border-radius: 8px; padding: 15px; background: #fff; }
        textarea { width: 100%; height: 110px; font-size: 28px; border: none; outline: none; resize: none; background: transparent; }
        
        .error-highlight { background-color: #ffcccc; color: #cc0000; text-decoration: underline; }
        .status-banner { background: var(--teal); color: white; text-align: center; padding: 15px; border-radius: 8px; font-size: 22px; font-weight: bold; margin: 20px 0; }
        .status-tag { background: white; color: var(--green); padding: 5px 25px; border-radius: 5px; display: inline-block; margin-left: 10px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <div id="page-login" class="box auth-card">
        <h2 style="color: var(--blue);">লগইন করুন</h2>
        <input type="text" id="login-user" placeholder="Gmail (ইউজারনেম)">
        <input type="password" id="login-pass" placeholder="পাসওয়ার্ড">
        <button class="btn-main" onclick="doLogin()">লগইন</button>
        <p>অ্যাকাউন্ট নেই? <a href="#" onclick="showPage('page-signup')">রেজিস্ট্রেশন করুন</a></p>
        <hr><button onclick="showPage('page-admin-auth')" style="background:none; border:none; color:silver; cursor:pointer; font-size:10px;">Admin Panel</button>
    </div>

    <div id="page-admin-auth" class="box auth-card hidden">
        <h2>Admin Login</h2>
        <input type="password" id="admin-entry-pass" placeholder="এডমিন পাসওয়ার্ড দিন">
        <button class="btn-main" onclick="checkAdminAccess()">প্রবেশ করুন</button>
        <button onclick="showPage('page-login')" style="margin-top:10px; background:none; border:none; color:gray; cursor:pointer;">ফিরে যান</button>
    </div>

    <div id="page-signup" class="box auth-card hidden">
        <h2 style="color: var(--green);">রেজিস্ট্রেশন</h2>
        <div id="sign-inputs">
            <input type="text" id="sign-name" placeholder="আপনার নাম">
            <input type="text" id="sign-user" placeholder="Gmail দিন">
            <input type="password" id="sign-pass" placeholder="পাসওয়ার্ড (৬ অক্ষর)">
            <button class="btn-main" style="background: var(--green);" onclick="doSignup()">কোড পাঠান</button>
        </div>
        <div id="verify-div" class="hidden">
            <input type="text" id="verify-code" placeholder="৪ ডিজিটের কোড">
            <button class="btn-main" onclick="verifyAndFinish()">ভেরিফাই করুন</button>
        </div>
        <p><a href="#" onclick="showPage('page-login')">ফিরে যান</a></p>
    </div>

    <div id="page-exam" class="hidden">
        <div class="box" style="display: flex; justify-content: space-between; align-items: center;">
            <div>👤 পরীক্ষার্থী: <b><span id="display-name"></span></b></div>
            <div style="color: var(--red); font-size: 20px; font-weight: bold;">সময় বাকি: <span id="timer">00:00</span></div>
        </div>
        <div id="passage-stable" class="box bijoy-font"><div id="p-text"></div></div>
        <div class="input-box">
            <textarea id="t-input" class="bijoy-font" placeholder="বিজয় ক্লাসিক (ANSI) মোডে টাইপ করুন..." oninput="startCount()" onpaste="return false;"></textarea>
        </div>
        <div style="text-align: right; margin-top: 15px;">
            <button class="btn-main" style="width: auto; background: var(--green); padding: 10px 40px;" onclick="finishExam()">পরীক্ষা শেষ করুন</button>
        </div>
    </div>

    <div id="page-result" class="box hidden">
        <div class="result-header">🔍 টাইপিং ফলাফল (Bijoy 52)</div>
        <div class="result-grid">
            <div class="card c-green">
                <h4>তথ্য</h4>
                <p><span>🗓️ তারিখ:</span> <span id="r-date"></span></p>
                <p><span>⏱️ সময়:</span> <span id="r-time-taken"></span></p>
            </div>
            <div class="card c-orange">
                <h4>গতি ও নির্ভুলতা</h4>
                <p><span>🚀 WPM:</span> <b id="r-wpm"></b></p>
                <p><span>🎯 Accuracy:</span> <b id="r-acc"></b></p>
            </div>
            <div class="card c-red">
                <h4>বিশ্লেষণ</h4>
                <p><span>❌ ভুল শব্দ:</span> <span id="r-wrong"></span></p>
                <p><span>📉 ভুলের হার:</span> <span id="r-err"></span></p>
            </div>
        </div>
        <div class="status-banner">🌟 ফলাফল: <div class="status-tag" id="r-status">--</div></div>
        
        <div style="margin-top:20px;">
            <div style="font-weight:bold;">আপনার লেখা:</div>
            <div id="user-compare-text" class="bijoy-font" style="padding:15px; border:1px solid #ddd; background:#f9f9f9; min-height:50px; border-radius:5px;"></div>
        </div>
        
        <center><button class="btn-main" style="width: 200px; margin-top:20px;" onclick="location.reload()">আবার পরীক্ষা দিন</button></center>
    </div>

    <div id="page-admin" class="box hidden">
        <h2>Admin Panel</h2>
        <label>পরীক্ষার সময় (সেকেন্ড):</label>
        <input type="number" id="adm-time" value="300">
        <label>পাস করার WPM:</label>
        <input type="number" id="adm-min-wpm" value="20">
        <label>প্যাসেজ (অবশ্যই বিজয় দিয়ে লিখবেন):</label>
        <textarea id="adm-text" class="bijoy-font" style="height: 150px; border:1px solid #ddd;"></textarea>
        <button class="btn-main" onclick="saveAdminSettings()">Save Settings</button>
        <button class="btn-main" style="background:#666; margin-top:10px;" onclick="location.reload()">Logout</button>
    </div>
</div>

<script>
    (function() { emailjs.init("YOUR_PUBLIC_KEY"); })();

    let users = JSON.parse(localStorage.getItem('bcc_users')) || [];
    let passage = localStorage.getItem('bcc_text') || "GLRO weLv fvievie"; // Sample Bijoy Text
    let examDuration = parseInt(localStorage.getItem('bcc_duration')) || 300;
    let minWPM = parseInt(localStorage.getItem('bcc_min_wpm')) || 20;
    let timerInt, timeLeft = examDuration, timerOn = false;

    document.getElementById('p-text').innerText = passage;

    function showPage(id) {
        document.querySelectorAll('.container > div').forEach(d => d.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    function doLogin() {
        const u = document.getElementById('login-user').value.toLowerCase().trim();
        const p = document.getElementById('login-pass').value;
        const found = users.find(x => x.user === u && x.pass === p);
        if(found) {
            document.getElementById('display-name').innerText = found.name;
            showPage('page-exam');
        } else alert("ভুল তথ্য!");
    }

    function startCount() {
        if(!timerOn) {
            timerOn = true;
            timerInt = setInterval(() => {
                timeLeft--;
                let m = Math.floor(timeLeft/60), s = timeLeft%60;
                document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                if(timeLeft <= 0) finishExam();
            }, 1000);
        }
    }

    function finishExam() {
        clearInterval(timerInt);
        const input = document.getElementById('t-input').value;
        
        // বিজয় (ANSI) এর জন্য সরাসরি স্প্লিট লজিক (Normalization ছাড়াই)
        const pWords = passage.trim().split(/\s+/);
        const iWords = input.trim().split(/\s+/);
        
        let correctChars = 0, wrongWords = 0, resultHTML = "";

        pWords.forEach((word, i) => {
            let uWord = iWords[i] || "";
            if(uWord === word) {
                resultHTML += `<span>${uWord} </span>`;
                correctChars += word.length + 1;
            } else {
                wrongWords++;
                resultHTML += `<span class="error-highlight">${uWord || '___'}</span> `;
            }
        });

        let wpm = ((input.length / 5) / (examDuration / 60)).toFixed(2);
        let accuracy = (input.length > 0) ? ((correctChars / input.length) * 100).toFixed(2) : 0;
        let errRate = (100 - accuracy).toFixed(2);

        document.getElementById('r-wpm').innerText = wpm;
        document.getElementById('r-acc').innerText = accuracy + "%";
        document.getElementById('r-wrong').innerText = wrongWords;
        document.getElementById('r-err').innerText = errRate + "%";
        document.getElementById('r-date').innerText = new Date().toLocaleDateString();
        document.getElementById('r-time-taken').innerText = (examDuration - timeLeft) + " সেকেন্ড";
        document.getElementById('user-compare-text').innerHTML = resultHTML;

        const st = document.getElementById('r-status');
        if(wpm >= minWPM && errRate <= 5) { st.innerText = "PASS"; st.style.color = "green"; }
        else { st.innerText = "FAIL"; st.style.color = "red"; }

        showPage('page-result');
    }

    function checkAdminAccess() {
        if(document.getElementById('admin-entry-pass').value === "admin123") {
            document.getElementById('adm-text').value = passage;
            document.getElementById('adm-time').value = examDuration;
            document.getElementById('adm-min-wpm').value = minWPM;
            showPage('page-admin');
        } else alert("ভুল পাসওয়ার্ড!");
    }

    function saveAdminSettings() {
        localStorage.setItem('bcc_text', document.getElementById('adm-text').value);
        localStorage.setItem('bcc_duration', document.getElementById('adm-time').value);
        localStorage.setItem('bcc_min_wpm', document.getElementById('adm-min-wpm').value);
        alert("সংরক্ষিত হয়েছে!");
        location.reload();
    }

    // Signup Logic (Simple version for brevity)
    function doSignup() {
        const n = document.getElementById('sign-name').value;
        const u = document.getElementById('sign-user').value.toLowerCase().trim();
        const p = document.getElementById('sign-pass').value;
        if(n && u && p) {
            users.push({name: n, user: u, pass: p, expiry: Date.now() + 2592000000});
            localStorage.setItem('bcc_users', JSON.stringify(users));
            alert("সফল হয়েছে! লগইন করুন।");
            showPage('page-login');
        }
    }
</script>

</body>
</html>
